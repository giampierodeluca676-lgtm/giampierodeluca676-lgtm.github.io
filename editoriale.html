<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEYGAP | INTELLIGENCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #05070a; --panel: #0d1219; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; min-height: 100vh; background-image: radial-gradient(circle at 50% 0%, #111a24 0%, transparent 70%); }
        .neon-text { color: var(--neon); text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); font-family: 'Orbitron', sans-serif; }
        
        /* Effetto Rilievo 3D Mozzafiato */
        .card-rilievo {
            background: linear-gradient(145deg, #0e141c, #0b0f15);
            border-radius: 12px;
            border: 1px solid rgba(0, 242, 255, 0.15);
            box-shadow: 
                8px 8px 16px rgba(0,0,0,0.8), 
                -4px -4px 12px rgba(255,255,255,0.03),
                inset 1px 1px 2px rgba(255,255,255,0.05);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header-rilievo {
            background: #080c11;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            border-bottom: 2px solid rgba(0, 242, 255, 0.3);
        }

        .status-row { 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
            padding: 14px 16px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            font-family: 'Orbitron'; 
            font-size: 13px;
            transition: background 0.3s;
        }
        .status-row:hover { background: rgba(0, 242, 255, 0.05); }
        .value-box { background: #000; padding: 4px 10px; border-radius: 4px; border: 1px solid rgba(0,242,255,0.2); box-shadow: inset 0 0 5px rgba(0,0,0,0.8); }

        .btn-glow { 
            background: linear-gradient(90deg, transparent, rgba(0,242,255,0.1), transparent); 
            border: 1px solid var(--neon); 
            color: var(--neon); 
            font-family: 'Orbitron'; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            transition: all 0.4s ease; 
        }
        .btn-glow:hover { background: var(--neon); color: #000; box-shadow: 0 0 25px var(--neon); transform: scale(1.02); }
    </style>
</head>
<body class="p-4 lg:p-8 flex flex-col gap-6">

    <header class="header-rilievo p-6 rounded-xl flex flex-col lg:flex-row justify-between items-center gap-4 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-cyan-400 to-transparent opacity-50"></div>
        
        <div class="flex items-center gap-4 w-full lg:w-auto">
            <button onclick="window.location.href='index.html'" class="btn-glow px-4 py-2 text-xs rounded-md backdrop-blur-sm">
                ◄ ACCESSO MAIN
            </button>
            <div class="neon-text text-3xl lg:text-4xl font-black italic tracking-widest">KEYGAP<span class="text-white opacity-50 font-light">_INTEL</span></div>
        </div>

        <div class="flex gap-8 text-right bg-black/40 p-3 rounded-lg border border-white/5 shadow-inner">
            <div>
                <div class="text-[9px] text-cyan-500 tracking-[3px] font-bold mb-1 uppercase">Sys_Date</div>
                <div id="date" class="text-2xl font-bold text-gray-200">--/--/----</div>
            </div>
            <div>
                <div class="text-[9px] text-cyan-500 tracking-[3px] font-bold mb-1 uppercase">Sys_Time</div>
                <div id="clock" class="neon-text text-3xl font-bold">00:00:00</div>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 flex-1">
        
        <div class="lg:col-span-8 card-rilievo min-h-[600px] h-[75vh]">
            <div class="bg-[#05080c] p-4 flex items-center justify-between border-b border-cyan-900/50">
                <div class="neon-text text-[11px] tracking-[5px] font-black flex items-center gap-2">
                    <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div> GLOBAL_NEWS_FEED
                </div>
            </div>
            <div class="flex-1 w-full relative">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                { "feedMode": "market", "market": "crypto", "colorTheme": "dark", "isTransparent": true, "displayMode": "regular", "width": "100%", "height": "100%", "locale": "it" }
                </script>
            </div>
        </div>

        <div class="lg:col-span-4 flex flex-col gap-6 h-[75vh]">
            
            <div class="card-rilievo flex-shrink-0">
                <div class="bg-gradient-to-r from-cyan-900/20 to-transparent p-3 border-b border-cyan-500/30">
                    <div class="neon-text text-[11px] tracking-[5px] font-black">KEYGAP_BOT_STATUS</div>
                </div>
                <div class="p-2">
                    <div class="status-row">
                        <span class="text-gray-400">STATUS</span>
                        <span id="m-status" class="value-box text-yellow-400 font-bold text-[10px] animate-pulse">SINCRONIZZAZIONE...</span>
                    </div>
                    <div class="status-row">
                        <span class="text-gray-400">PRICE</span>
                        <span id="m-price" class="value-box text-white">WAITING_DATA</span>
                    </div>
                    <div class="status-row">
                        <span class="text-gray-400">SIGNAL</span>
                        <span id="m-signal" class="value-box text-white">WAITING_DATA</span>
                    </div>
                    <div class="status-row">
                        <span class="text-gray-400">ACCURACY</span>
                        <span id="m-reliability" class="value-box text-white">WAITING_DATA</span>
                    </div>
                </div>
            </div>

            <div class="card-rilievo flex-1 min-h-[300px]">
                <div class="bg-[#05080c] p-3 border-b border-cyan-900/50">
                    <div class="neon-text text-[10px] tracking-[4px] font-black">MARKET_HEATMAP</div>
                </div>
                <div class="flex-1 w-full">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-crypto-coins-heatmap.js" async>
                    { "dataSource": "Crypto", "blockSize": "market_cap_calc", "blockColor": "change", "locale": "it", "symbolUrl": "", "colorTheme": "dark", "hasTopBar": false, "isDataSetEnabled": false, "isZoomEnabled": true, "hasSymbolTooltip": true, "width": "100%", "height": "100%" }
                    </script>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Sincronizzazione Dati
        async function loadKeygapData() {
            try {
                const r = await fetch('./market_status.json?v=' + Date.now());
                if (!r.ok) throw new Error("File Missing");
                const d = await r.json();
                const s = document.getElementById('m-status');
                
                s.textContent = d.status || "N/A";
                // Rimuove l'animazione se i dati arrivano
                s.classList.remove("animate-pulse", "text-yellow-400");
                s.classList.add("text-green-400", "shadow-[0_0_10px_rgba(74,222,128,0.5)]");

                document.getElementById('m-price').textContent = d.price || "---";
                document.getElementById('m-signal').textContent = d.signal || "---";
                document.getElementById('m-reliability').textContent = d.reliability || "---";
            } catch (e) { 
                console.log("File JSON non trovato o in aggiornamento."); 
                document.getElementById('m-status').textContent = "IN ATTESA DEL BOT...";
                document.getElementById('m-status').classList.add("text-red-500", "animate-pulse");
            }
        }
        
        // Orologio
        function updateDateTime() { 
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT');
            document.getElementById('date').textContent = now.toLocaleDateString('it-IT');
        }
        
        // Avvia i motori
        setInterval(updateDateTime, 1000); 
        setInterval(loadKeygapData, 5000);
        updateDateTime(); loadKeygapData();
    </script>

</body>
</html>
