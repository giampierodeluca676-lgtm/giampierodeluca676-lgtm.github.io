<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Keygap Intelligence Terminal</title>
    <style>
        body { background:#0a0f1a; color:#e2e8f0; font-family: sans-serif; margin:0; padding:20px; }
        .header { border-bottom:2px solid #38bdf8; padding:20px; text-align:center; margin-bottom:30px; }
        .container { display: flex; gap: 20px; flex-wrap: wrap; }
        .col-main { flex: 2; min-width: 300px; }
        .col-side { flex: 1; min-width: 250px; }
        .widget-box { border: 1px solid #1e293b; border-radius: 10px; overflow: hidden; background: #111827; }
        h3 { color: #38bdf8; text-transform: uppercase; letter-spacing: 2px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="margin:0; letter-spacing:5px;">KEYGAP EDITORIAL TERMINAL</h1>
        <p style="color:#64748b;">Global Market Microstructure & World News Feed</p>
    </div>

    <div class="widget-box" style="margin-bottom:20px;">
        <div class="tradingview-widget-container">
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            {"symbols": [{"proName": "BITSTAMP:BTCUSD", "title": "BTC/USD"}, {"proName": "BITSTAMP:ETHUSD", "title": "ETH/USD"}, {"proName": "BINANCE:XRPUSD", "title": "XRP/USD"}], "colorTheme": "dark", "isTransparent": true, "displayMode": "adaptive"}
            </script>
        </div>
    </div>

    <div class="container">
        <div class="col-main">
            <h3>Finanza & Crypto Intelligence</h3>
            <div class="widget-box" style="height:800px;">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                {"feedMode": "all_symbols", "colorTheme": "dark", "isTransparent": true, "displayMode": "regular", "width": "100%", "height": "100%", "locale": "it"}
                </script>
            </div>
        </div>
        <div class="col-side">
            <h3>Notizie dal Mondo</h3>
            <div class="widget-box" style="height:800px; padding:10px;">
                <iframe width="100%" height="100%" src="https://rss.app/embed/v1/visual-light/tY9W0Wv4Wv9W0Wv4" frameborder="0"></iframe>
            </div>
        </div>
    </div>
</body>
</html>
