<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEYGAP | INTELLIGENCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #010204; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; min-height: 100vh; }
        .neon-text { color: var(--neon); text-shadow: 0 0 15px rgba(0, 242, 255, 0.7); font-family: 'Orbitron'; }
        header { padding: 20px; border-bottom: 2px solid var(--neon); background: rgba(0,0,0,0.9); }
        .panel-3d { background: rgba(10, 11, 13, 0.95); border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 8px; min-height: 400px; }
        .status-row { border-bottom: 1px solid rgba(0, 242, 255, 0.1); padding: 10px; display: flex; justify-content: space-between; font-family: 'Orbitron'; font-size: 12px; }
    </style>
</head>
<body class="p-4 lg:p-8">
    <header class="flex justify-between items-center mb-8">
        <div class="neon-text text-3xl italic">KEYGAP_INTEL</div>
        <div class="text-right">
            <div id="date" class="text-xl font-bold">--/--/----</div>
            <div id="clock" class="neon-text text-2xl font-bold">00:00:00</div>
        </div>
    </header>
    <button onclick="window.location.href='index.html'" class="mb-6 border border-neon p-2 text-[10px] neon-text uppercase hover:bg-neon hover:text-black"> < Indietro</button>
    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
        <div class="lg:col-span-3 panel-3d h-[70vh]">
            <div class="p-2 bg-[#161b22] border-b border-white/5 font-bold text-[10px] tracking-[4px] neon-text">NEWS_FEED</div>
            <div style="height: calc(100% - 40px); width: 100%;">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                { "feedMode": "all_symbols", "colorTheme": "dark", "isTransparent": true, "width": "100%", "height": "100%", "locale": "it" }
                </script>
            </div>
        </div>
        <div class="lg:col-span-1 panel-3d">
            <div class="p-2 bg-[#161b22] border-b border-white/5 font-bold text-[10px] tracking-[4px] neon-text">MARKET_STATUS</div>
            <div class="p-4">
                <div class="status-row"><span>STATUS</span><span id="m-status" class="text-green-400 font-bold">---</span></div>
                <div class="status-row"><span>PRICE</span><span id="m-price" class="font-bold">---</span></div>
                <div class="status-row"><span>SIGNAL</span><span id="m-signal" class="font-bold">---</span></div>
                <div class="status-row"><span>RELIABILITY</span><span id="m-reliability" class="font-bold">---</span></div>
            </div>
        </div>
    </div>
    <script>
        async function loadData() {
            try {
                const r = await fetch('./market_status.json?v=' + Date.now());
                const d = await r.json();
                document.getElementById('m-status').textContent = d.status || "N/A";
                document.getElementById('m-price').textContent = d.price || "---";
                document.getElementById('m-signal').textContent = d.signal || "---";
                document.getElementById('m-reliability').textContent = d.reliability || "---";
            } catch (e) { console.log("Sync..."); }
        }
        function updateTime() {
            const n = new Date();
            document.getElementById('clock').textContent = n.toLocaleTimeString('it-IT');
            document.getElementById('date').textContent = n.toLocaleDateString('it-IT');
        }
        setInterval(updateTime, 1000); setInterval(loadData, 5000);
        updateTime(); loadData();
    </script>
</body>
</html>
