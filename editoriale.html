<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEYGAP | GLOBAL INTELLIGENCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #010204; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; min-height: 100vh; overflow-x: hidden; }
        .neon-text { color: var(--neon); text-shadow: 0 0 15px rgba(0, 242, 255, 0.7); font-family: 'Orbitron', sans-serif; }
        .panel-3d { background: rgba(10, 11, 13, 0.9); border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 4px; height: 85vh; }
        .btn-back { border: 1px solid rgba(255,255,255,0.2); padding: 10px 25px; transition: 0.4s; font-family: 'Orbitron'; font-size: 10px; }
        .btn-back:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-[1800px] mx-auto">
        <header class="flex justify-between items-center mb-8">
            <button onclick="window.location.href='index.html'" class="btn-back uppercase font-bold tracking-[3px]">< Torna al Terminale</button>
            <div class="text-right">
                <h1 class="neon-text text-xl tracking-[10px] uppercase">Global Intelligence</h1>
                <p class="text-[10px] text-white/30 tracking-[4px]">WARS / MARKETS / BANKING / MACRO</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-3 panel-3d">
                <div class="p-2 bg-[#161b22] border-b border-white/5 font-bold text-[10px] tracking-[4px] neon-text uppercase">Real-Time Clickable Feed</div>
                <div class="tradingview-widget-container" style="height: calc(100% - 30px); width: 100%;">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                    {
                      "feedMode": "all_symbols",
                      "colorTheme": "dark",
                      "isTransparent": true,
                      "displayMode": "regular",
                      "width": "100%",
                      "height": "100%",
                      "locale": "it"
                    }
                    </script>
                </div>
            </div>

            <div class="lg:col-span-1 panel-3d">
                <div class="p-2 bg-[#161b22] border-b border-white/5 font-bold text-[10px] tracking-[4px] neon-text uppercase">Market Status</div>
                <div class="tradingview-widget-container" style="height: calc(100% - 30px); width: 100%;">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
                    {
                      "colorTheme": "dark",
                      "dateRange": "12M",
                      "showChart": false,
                      "locale": "it",
                      "width": "100%",
                      "height": "100%",
                      "largeChartUrl": "",
                      "isTransparent": true,
                      "showSymbolLogo": true,
                      "tabs": [
                        {
                          "title": "Indici/Banche",
                          "symbols": [
                            { "s": "FOREXCOM:SPX", "d": "S&P 500" },
                            { "s": "INDEX:DXY", "d": "Dollaro Index" },
                            { "s": "NYSE:JPM", "d": "JP Morgan" },
                            { "s": "NYSE:GS", "d": "Goldman Sachs" },
                            { "s": "NYSE:BAC", "d": "Bank of America" }
                          ]
                        },
                        {
                          "title": "Geopolitica",
                          "symbols": [
                            { "s": "TVC:GOLD", "d": "Oro (Guerra)" },
                            { "s": "TVC:US10Y", "d": "Bond USA 10Y" },
                            { "s": "NYMEX:CL1!", "d": "Petrolio" }
                          ]
                        }
                      ]
                    }
                    </script>
                </div>
            </div>
        </div>

        <footer class="mt-8 text-center opacity-10">
            <div class="neon-text text-[8px] tracking-[30px]">Keygap Global Intelligence v4.0</div>
        </footer>
    </div>
</body>
</html>
