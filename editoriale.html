<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEYGAP | GLOBAL INTELLIGENCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #010204; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; min-height: 100vh; overflow: hidden; }
        .neon-text { color: var(--neon); text-shadow: 0 0 15px rgba(0, 242, 255, 0.7); font-family: 'Orbitron', sans-serif; }
        .panel-3d { background: rgba(10, 11, 13, 0.9); border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 4px; height: 80vh; }
        .btn-back { border: 1px solid rgba(255,255,255,0.2); padding: 10px 25px; transition: 0.4s; font-family: 'Orbitron'; font-size: 10px; }
        .btn-back:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }
    </style>
</head>
<body class="p-8">
    <div class="max-w-[1800px] mx-auto">
        <header class="flex justify-between items-center mb-8 opacity-70">
            <div class="text-left">
                <div class="neon-text text-[10px] tracking-[6px] mb-1">SYSTEM://DATE</div>
                <div id="date" class="text-2xl font-light tracking-tighter text-white/50 uppercase">--/--/----</div>
            </div>
            <div class="text-center flex-1">
                <h1 class="neon-text text-xl tracking-[15px] uppercase">Intelligence Terminal</h1>
            </div>
            <div class="text-right">
                <div class="neon-text text-[10px] tracking-[6px] mb-1">SYSTEM://TIME</div>
                <div id="clock" class="text-2xl font-light tracking-tighter text-white/50">00:00:00</div>
            </div>
        </header>

        <div class="flex mb-6">
            <button onclick="window.location.href='index.html'" class="btn-back uppercase font-bold tracking-[3px]">< Torna al Terminale</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-3 panel-3d">
                <div class="p-2 bg-[#161b22] border-b border-white/5 font-bold text-[10px] tracking-[4px] neon-text uppercase">Real-Time News Feed</div>
                <div style="height: calc(100% - 30px); width: 100%;">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                    { "feedMode": "all_symbols", "colorTheme": "dark", "isTransparent": true, "displayMode": "regular", "width": "100%", "height": "100%", "locale": "it" }
                    </script>
                </div>
            </div>
            <div class="lg:col-span-1 panel-3d">
                <div class="p-2 bg-[#161b22] border-b border-white/5 font-bold text-[10px] tracking-[4px] neon-text uppercase">Market Status</div>
                <div style="height: calc(100% - 30px); width: 100%;">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
                    { "colorTheme": "dark", "locale": "it", "width": "100%", "height": "100%", "isTransparent": true, "tabs": [{ "title": "Indici/Banche", "symbols": [{ "s": "FOREXCOM:SPX" }, { "s": "INDEX:DXY" }, { "s": "NYSE:JPM" }, { "s": "NYSE:GS" }] }] }
                    </script>
                </div>
            </div>
        </div>
    </div>
    <script>
        function updateDateTime() { 
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT', { hour12: false });
            document.getElementById('date').textContent = now.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }
        setInterval(updateDateTime, 1000); updateDateTime();
    </script>
</body>
</html>
