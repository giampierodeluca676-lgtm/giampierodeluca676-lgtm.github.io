<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEYGAP | GLOBAL INTELLIGENCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #010204; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; min-height: 100vh; }
        .neon-text { color: var(--neon); text-shadow: 0 0 15px rgba(0, 242, 255, 0.7); font-family: 'Orbitron', sans-serif; }
        .panel-3d { background: rgba(10, 11, 13, 0.9); border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 4px; min-height: 400px; }
        .status-row { border-bottom: 1px solid rgba(0, 242, 255, 0.1); padding: 12px; display: flex; justify-content: space-between; font-family: 'Orbitron'; font-size: 13px; }
    </style>
</head>
<body class="p-4 lg:p-8">
    <div class="max-w-[1800px] mx-auto">
        <header class="flex flex-col lg:flex-row justify-between items-center mb-8 gap-4">
            <div class="text-center lg:text-left">
                <div class="neon-text text-[10px] tracking-[6px] mb-1">SYSTEM://DATE</div>
                <div id="date" class="text-3xl font-bold text-white uppercase">--/--/----</div>
            </div>
            <h1 class="neon-text text-xl tracking-[15px] uppercase">Intelligence Terminal</h1>
            <div class="text-center lg:text-right">
                <div class="neon-text text-[10px] tracking-[6px] mb-1">SYSTEM://TIME</div>
                <div id="clock" class="text-4xl font-bold text-white">00:00:00</div>
            </div>
        </header>

        <button onclick="window.location.href='index.html'" class="mb-6 border border-white/20 p-3 text-[10px] font-bold uppercase tracking-widest hover:bg-cyan-500 hover:text-black transition w-full lg:w-auto"> < Torna al Terminale </button>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-2 panel-3d h-[60vh]">
                <div class="p-2 bg-[#161b22] border-b border-white/5 font-bold text-[10px] tracking-[4px] neon-text uppercase">Real-Time News Feed</div>
                <div style="height: calc(100% - 40px); width: 100%;">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                    { "feedMode": "all_symbols", "colorTheme": "dark", "isTransparent": true, "displayMode": "regular", "width": "100%", "height": "100%", "locale": "it" }
                    </script>
                </div>
            </div>

            <div class="lg:col-span-1 panel-3d">
                <div class="p-2 bg-[#161b22] border-b border-white/5 font-bold text-[10px] tracking-[4px] neon-text uppercase">Keygap Market Status</div>
                <div class="p-4">
                    <div class="status-row"><span>STATUS</span><span id="m-status" class="text-green-400 font-bold">---</span></div>
                    <div class="status-row"><span>PRICE</span><span id="m-price" class="font-bold">---</span></div>
                    <div class="status-row"><span>SIGNAL</span><span id="m-signal" class="font-bold">---</span></div>
                    <div class="status-row"><span>RELIABILITY</span><span id="m-reliability" class="font-bold">---</span></div>
                </div>
            </div>

            <div class="lg:col-span-1 panel-3d h-[400px]">
                <div class="p-2 bg-[#161b22] border-b border-white/5 font-bold text-[10px] tracking-[4px] neon-text uppercase">Global Indices</div>
                <div style="height: calc(100% - 40px); width: 100%;">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
                    { "colorTheme": "dark", "locale": "it", "width": "100%", "height": "100%", "isTransparent": true, "tabs": [{ "title": "Markets", "symbols": [{ "s": "FOREXCOM:SPX" }, { "s": "INDEX:DXY" }, { "s": "NYSE:JPM" }] }] }
                    </script>
                </div>
            </div>
        </div>
    </div>
    <script>
        async function loadKeygapData() {
            try {
                const r = await fetch('./market_status.json?v=' + Date.now());
                const d = await r.json();
                document.getElementById('m-status').textContent = d.status || "N/A";
                document.getElementById('m-price').textContent = d.price || "---";
                document.getElementById('m-signal').textContent = d.signal || "---";
                document.getElementById('m-reliability').textContent = d.reliability || "---";
            } catch (e) { console.log("Errore sincronizzazione dati"); }
        }
        function updateDateTime() { 
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT');
            document.getElementById('date').textContent = now.toLocaleDateString('it-IT');
        }
        setInterval(updateDateTime, 1000); 
        setInterval(loadKeygapData, 5000);
        updateDateTime(); loadKeygapData();
    </script>
</body>
</html>
