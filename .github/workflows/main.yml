name: Keygap Auto Update
on:
  schedule:
    - cron: "0 9 * * *"
    - cron: "30 18 * * *"
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install
        run: pip install requests
      - name: Run
        run: python bot.py
      - name: Save
        run: |
          git config --global user.name "giampierodeluca676-lgtm"
          git config --global user.email "giampierodeluca676@gmail.com"
          git add -A
          git commit -m "KEYGAP: Auto Log Update" || exit 0
          git push origin main || exit 0
