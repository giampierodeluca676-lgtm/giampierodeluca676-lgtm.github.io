<style>
    .dashboard-integration-wrap {
        display: flex;
        justify-content: center;
        margin: 50px 0;
        border-top: 1px solid #1e293b;
        padding-top: 30px;
    }
    .btn-keygap-main {
        background: transparent;
        color: #38bdf8;
        border: 2px solid #38bdf8;
        padding: 20px 50px;
        font-family: 'Segoe UI', sans-serif;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 5px;
        cursor: pointer;
        transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        position: relative;
        overflow: hidden;
    }
    .btn-keygap-main:hover {
        background: #38bdf8;
        color: #0a0f1a;
        box-shadow: 0 0 40px rgba(56, 189, 248, 0.4);
    }
    .fade-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: #0a0f1a;
        opacity: 0;
        visibility: hidden;
        transition: all 0.8s ease;
        z-index: 9999;
    }
    .fade-active {
        opacity: 1;
        visibility: visible;
    }
</style>

<div class="dashboard-integration-wrap">
    <button id="launch-editorial" class="btn-keygap-main">
        Apri Terminale Notizie Globali
    </button>
</div>
<div id="global-fade" class="fade-overlay"></div>

<script>
    document.getElementById('launch-editorial').addEventListener('click', function() {
        document.getElementById('global-fade').classList.add('fade-active');
        setTimeout(function() {
            // Puntiamo al file editoriale.html nella stessa cartella
            window.location.href = "editoriale.html";
        }, 800);
    });
</script>
