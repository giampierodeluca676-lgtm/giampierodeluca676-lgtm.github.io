<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEYGAP | ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background: #010204; color: #fff; font-family: 'Rajdhani'; margin: 0; overflow: hidden; }
        .neon { color: #00f2ff; text-shadow: 0 0 15px #00f2ff; font-family: 'Orbitron'; }
        .grid-main { display: grid; grid-template-columns: 1fr; height: 100vh; padding: 20px; gap: 20px; }
        @media (min-width: 1024px) { .grid-main { grid-template-columns: 3fr 1fr; } }
        .panel { border: 2px solid #00f2ff; border-radius: 15px; background: rgba(0,0,0,0.8); position: relative; overflow: hidden; }
    </style>
</head>
<body>
    <div class="grid-main">
        <div class="panel">
            <div id="CHART_NEW" style="width: 100%; height: 100%;"></div>
        </div>
        <div class="panel p-6 flex flex-col justify-between text-center">
            <h1 class="neon text-5xl italic">KEYGAP</h1>
            <div class="text-3xl font-black" id="clock">00:00:00</div>
            <div class="space-y-4">
                <button onclick="loadAsset('BITSTAMP:BTCUSD')" class="w-full border-2 border-[#00f2ff] p-4 font-bold hover:bg-[#00f2ff] hover:text-black transition uppercase">Bitcoin</button>
                <button onclick="loadAsset('TVC:GOLD')" class="w-full border-2 border-[#00f2ff] p-4 font-bold hover:bg-[#00f2ff] hover:text-black transition uppercase">Oro</button>
            </div>
            <button onclick="window.location.href='index.html'" class="w-full bg-white text-black p-4 font-black">TORNA ALLA HOME</button>
        </div>
    </div>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        function loadAsset(s) {
            new TradingView.widget({
                "autosize": true, "symbol": s, "interval": "D", "theme": "dark",
                "style": "3", // STILE AREA: Molto più moderno delle linee
                "locale": "it", "container_id": "CHART_NEW", "enable_publishing": false,
                "hide_top_toolbar": false, "backgroundColor": "#010204"
            });
        }
        function time() { document.getElementById('clock').textContent = new Date().toLocaleTimeString('it-IT'); }
        setInterval(time, 1000);
        loadAsset('BITSTAMP:BTCUSD');
    </script>
</body>
</html>
