<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEYGAP | Intelligence Financial Terminal</title>
    <script src="https://pl28819682.effectivegatecpm.com/07/47/37/074737f2d1be0f3c0e9de0585a695fd7.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #05070a; --panel-bg: #0d1117; --accent: #00e5ff; --success: #00ff88; --border: rgba(255, 255, 255, 0.08); }
        body { background-color: var(--bg-dark); color: #fff; font-family: 'Outfit', sans-serif; margin: 0; padding: 12px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; background: var(--panel-bg); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 12px; }
        .logo { font-family: 'JetBrains Mono'; font-weight: 900; font-size: 1.8rem; color: var(--accent); }
        .dashboard-grid { display: grid; grid-template-columns: 350px 1fr; gap: 12px; flex-grow: 1; }
        .card { background: var(--panel-bg); border: 1px solid var(--border); border-radius: 14px; padding: 25px; }
        .news-text { font-size: 1.2rem; font-weight: 700; line-height: 1.5; color: #e2e8f0; }
        .btn-access { width: 100%; background: var(--accent); color: #000; padding: 25px; border-radius: 12px; border: none; font-weight: 900; font-size: 1.4rem; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        #live-btc { font-family: 'JetBrains Mono'; font-size: 1.6rem; color: var(--success); font-weight: 700; }
    </style>
</head>
<body>
    <header><div class="logo">KEYGAP_ADVANTAGE</div><div id="live-btc">BTC: ---</div></header>
    <div class="dashboard-grid">
        <div class="card">
            <div style="color:var(--accent); font-weight:800; margin-bottom:10px;">LIVE FEED</div>
            <div class="news-text">Analisi Keygap: Rilevata accumulazione Whale. Scritte potenziate per visibilità massima.</div>
        </div>
        <div class="card" style="padding:0; overflow:hidden;">
            <div id="tv_widget" style="height: 100%;"></div>
            <script src="https://s3.tradingview.com/tv.js"></script>
            <script>new TradingView.widget({"autosize":true,"symbol":"BINANCE:BTCUSDT","interval":"15","theme":"dark","style":"1","locale":"it","container_id":"tv_widget"});</script>
        </div>
    </div>
    <a href="archivio.html" style="text-decoration:none;"><button class="btn-access">SFOGLIA ARCHIVIO REPORT</button></a>
    <script>
        const btcEl = document.getElementById('live-btc');
        const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
        ws.onmessage=(e)=>{const data=JSON.parse(e.data); btcEl.innerText=`$ ${parseFloat(data.p).toLocaleString()}`;};
    </script>
</body>
</html>
