<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEYGAP | TITAN TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #010204; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        .neon-text { color: var(--neon); text-shadow: 0 0 15px rgba(0, 242, 255, 0.7); font-family: 'Orbitron'; }
        header { padding: 15px 25px; border-bottom: 2px solid var(--neon); background: rgba(0,0,0,0.9); flex-shrink: 0; }
        .main-container { flex: 1; display: flex; flex-direction: column; padding: 15px; gap: 15px; }
        .chart-box { height: 350px; border: 1px solid var(--neon); border-radius: 8px; overflow: hidden; flex-shrink: 0; }
        .side-card { background: rgba(10, 15, 25, 0.98); border: 2px solid var(--neon); border-radius: 12px; padding: 10px; box-shadow: 0 0 20px rgba(0, 242, 255, 0.3); flex: 1; display: flex; flex-direction: column; min-height: 500px; }
        .btn-glow { background: rgba(0, 242, 255, 0.1); border: 1px solid var(--neon); color: var(--neon); font-family: 'Orbitron'; text-transform: uppercase; font-size: 11px; padding: 12px; transition: 0.3s; margin-top: 10px; }
        @media (min-width: 1024px) {
            .main-container { flex-direction: row; padding: 20px; }
            .chart-box { flex: 2.5; height: 80vh; }
            .side-card { flex: 1; height: 80vh; }
        }
    </style>
</head>
<body>
    <header class="flex justify-between items-center">
        <div class="neon-text text-4xl font-black italic">KEYGAP</div>
        <div class="text-right">
            <div id="date" class="text-2xl font-bold">--/--/----</div>
            <div id="clock" class="neon-text text-3xl font-bold">00:00:00</div>
        </div>
    </header>
    <div class="main-container">
        <div class="chart-box">
            <div id="tradingview_main" style="height:100%;width:100%"></div>
        </div>
        <div class="side-card">
            <div class="neon-text text-[10px] mb-2 tracking-[3px] p-2">GLOBAL_FINANCE_NEWS</div>
            <div style="flex: 1; overflow: hidden;">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                    {
                        "feedMode": "market",
                        "market": "crypto",
                        "colorTheme": "dark",
                        "isTransparent": true,
                        "displayMode": "regular",
                        "width": "100%",
                        "height": "100%",
                        "locale": "it"
                    }
                    </script>
                </div>
            </div>
            <button onclick="window.location.href='editoriale.html'" class="btn-glow w-full font-black text-center">FULL TERMINAL ACCESS</button>
        </div>
    </div>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        function updateTime() {
            const n = new Date();
            document.getElementById('clock').textContent = n.toLocaleTimeString('it-IT');
            document.getElementById('date').textContent = n.toLocaleDateString('it-IT');
        }
        new TradingView.widget({
            "autosize": true, "symbol": "BITSTAMP:BTCUSD", "interval": "D", "theme": "dark", "container_id": "tradingview_main", "hide_side_toolbar": true
        });
        setInterval(updateTime, 1000); updateTime();
    </script>
</body>
</html>
