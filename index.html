<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keygap Advantage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .ticker-wrap { background: #000; color: #3b82f6; padding: 8px 0; overflow: hidden; border-bottom: 1px solid #1e3a8a; }
        .ticker-move { display: inline-block; white-space: nowrap; animation: scroll 30s linear infinite; font-family: monospace; font-size: 0.9rem; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="bg-black text-gray-200 font-sans overflow-x-hidden">

    <div class="ticker-wrap">
        <div class="ticker-move" id="ticker-text">CARICAMENTO STREAM DATI... • KEYGAP ADVANTAGE • MARKET STATUS: ONLINE • </div>
    </div>

    <div class="p-6 flex justify-between items-center max-w-6xl mx-auto">
        <div>
            <h1 class="text-2xl font-black tracking-tighter text-blue-500">KEYGAP <span class="text-white">ADV</span></h1>
        </div>
        <div class="text-right">
            <p id="live-clock" class="text-2xl font-mono font-bold text-white">00:00:00</p>
            <p class="text-[10px] text-blue-400 uppercase tracking-widest">Live System Time</p>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-4 pb-10">
        <div class="glass rounded-2xl overflow-hidden shadow-2xl">
            <div id="tv-chart" style="height: 550px;"></div>
        </div>
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-4">
            <div class="glass p-4 rounded-xl text-center">
                <p class="text-[10px] uppercase text-gray-500">Signal</p>
                <p id="signal" class="text-green-400 font-bold">---</p>
            </div>
            <div class="glass p-4 rounded-xl text-center">
                <p class="text-[10px] uppercase text-gray-500">Price</p>
                <p id="price" class="text-white font-bold">---</p>
            </div>
            <div class="glass p-4 rounded-xl text-center">
                <p class="text-[10px] uppercase text-gray-500">Reliability</p>
                <p id="reliability" class="text-blue-400 font-bold">---</p>
            </div>
            <div class="glass p-4 rounded-xl text-center">
                <p class="text-[10px] uppercase text-gray-500">Bot Sync</p>
                <p id="bot-update" class="text-gray-400 font-mono">--:--</p>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // 1. Orologio Fluido (Indipendente dal bot)
        setInterval(() => {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString('it-IT');
        }, 1000);

        // 2. Grafico TradingView
        new TradingView.widget({
            "container_id": "tv-chart",
            "width": "100%", "height": "100%",
            "symbol": "BINANCE:BTCUSDT",
            "interval": "D", "theme": "dark", "style": "1", "locale": "it",
            "allow_symbol_change": true,
            "hide_top_toolbar": false,
            "save_image": false
        });

        // 3. Update Dati Bot
        async function refreshData() {
            try {
                const r = await fetch('market_status.json?v=' + Date.now());
                const d = await r.json();
                document.getElementById('signal').innerText = d.signal;
                document.getElementById('price').innerText = d.price;
                document.getElementById('reliability').innerText = d.reliability;
                document.getElementById('bot-update').innerText = d.last_update;
                document.getElementById('ticker-text').innerText = d.ticker.repeat(3);
            } catch (e) { console.log("Sync..."); }
        }
        setInterval(refreshData, 10000);
        refreshData();
    </script>
</body>
</html>
