<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEYGAP | ELITE TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #010204; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; transition: all 0.8s ease; overflow-x: hidden; }
        .neon-glow { color: var(--neon); text-shadow: 0 0 15px rgba(0, 242, 255, 0.8); font-family: 'Orbitron', sans-serif; }
        
        /* Titolo Ottimizzato per non schiacciare */
        .main-title { 
            font-size: clamp(1.5rem, 4vw, 3.5rem); 
            font-weight: 900; 
            color: var(--neon); 
            text-shadow: 0 0 30px rgba(0, 242, 255, 0.3); 
            line-height: 1; 
            margin: 20px 0 30px 0; 
            font-style: italic; 
            text-align: center;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .quant-panel { background: #0a0b0d; border: 1px solid #1e293b; border-radius: 4px; }
        .panel-header { background: #161b22; padding: 6px 12px; border-bottom: 1px solid #1e293b; }
        .chart-container { height: 550px; width: 100%; }
        .page-exit { opacity: 0; filter: blur(20px); transform: scale(1.05); }
        
        button { backdrop-filter: blur(5px); }
    </style>
</head>
<body class="p-2 md:p-6">
    <div class="max-w-[1600px] mx-auto">
        <header class="flex justify-between items-start mb-6 opacity-80">
            <div>
                <div class="neon-glow text-[9px] tracking-[6px] mb-1">SYSTEM STATUS: OPERATIONAL</div>
                <div id="clock" class="text-xl font-light tracking-tighter text-white/40">00:00:00</div>
            </div>
            <div class="text-right">
                <div class="neon-glow text-[9px] tracking-[4px]">KEYGAP AD-VANTAGE</div>
                <div class="text-[8px] text-white/20 uppercase">HFT Intelligence</div>
            </div>
        </header>

        <h1 class="main-title">Keygap <span class="text-white">AdVantage</span></h1>

        <div class="flex flex-col items-center gap-4 mb-8">
            <div class="flex flex-wrap justify-center gap-3">
                <button onclick="switchSymbol('BITSTAMP:BTCUSD')" class="px-4 py-1.5 border border-[#00f2ff]/50 text-[#00f2ff] font-bold tracking-widest hover:bg-[#00f2ff] hover:text-black transition-all duration-300 uppercase text-[10px]">Bitcoin</button>
                <button onclick="switchSymbol('TVC:GOLD')" class="px-4 py-1.5 border border-[#00f2ff]/50 text-[#00f2ff] font-bold tracking-widest hover:bg-[#00f2ff] hover:text-black transition-all duration-300 uppercase text-[10px]">Gold</button>
                <button onclick="switchSymbol('SP:SPX')" class="px-4 py-1.5 border border-[#00f2ff]/50 text-[#00f2ff] font-bold tracking-widest hover:bg-[#00f2ff] hover:text-black transition-all duration-300 uppercase text-[10px]">S&P 500</button>
                <button onclick="switchSymbol('FX:EURUSD')" class="px-4 py-1.5 border border-[#00f2ff]/50 text-[#00f2ff] font-bold tracking-widest hover:bg-[#00f2ff] hover:text-black transition-all duration-300 uppercase text-[10px]">EUR / USD</button>
            </div>
            <button onclick="startTransition()" class="px-8 py-2 border-2 border-[#00f2ff] text-[#00f2ff] font-bold tracking-[6px] hover:bg-[#00f2ff] hover:text-black transition-all duration-500 uppercase text-[9px] bg-[#00f2ff]/5">
                > TERMINALE NOTIZIE
            </button>
        </div>

        <div class="quant-panel mb-6">
            <div class="panel-header flex justify-between items-center">
                <span id="chart-title" class="neon-glow text-[10px] tracking-[4px]">MARKET ANALYTICS // BTCUSD</span>
            </div>
            <div id="tradingview_chart" class="chart-container"></div>
        </div>

        <div class="quant-panel mb-12">
            <div class="panel-header"><span class="neon-glow text-[10px] tracking-[4px]">Global Asset Distribution Heatmap</span></div>
            <div style="height: 350px;">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-crypto-coins-heatmap.js" async>
                { "symbolGroups": [ { "name": "Market Leaders", "symbols": [ { "name": "BINANCE:BTCUSDT" }, { "name": "BINANCE:ETHUSDT" }, { "name": "BINANCE:SOLUSDT" }, { "name": "BINANCE:BNBUSDT" }, { "name": "BINANCE:XRPUSDT" } ] } ], "colorTheme": "dark", "isTransparent": false, "hasSymbolTooltip": true, "locale": "it", "displayMode": "regular", "width": "100%", "height": "100%" }
                </script>
            </div>
        </div>
    </div>

    <footer class="text-center py-10 border-t border-white/5 opacity-10"><div class="neon-glow text-[9px] tracking-[15px]">Keygap Terminal</div></footer>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let widget;
        function initChart(symbol = 'BITSTAMP:BTCUSD') {
            widget = new TradingView.widget({
                "width": "100%", "height": "100%", "symbol": symbol, "interval": "D", "timezone": "Etc/UTC", "theme": "dark", "style": "1", "locale": "it", "enable_publishing": false, "hide_side_toolbar": false, "allow_symbol_change": true, "container_id": "tradingview_chart"
            });
        }
        function switchSymbol(symbol) {
            document.getElementById('chart-title').textContent = 'MARKET ANALYTICS // ' + symbol.split(':')[1];
            initChart(symbol);
        }
        function startTransition() {
            document.body.classList.add('page-exit');
            setTimeout(() => { window.location.href = "editoriale.html"; }, 800);
        }
        function updateClock() { document.getElementById('clock').textContent = new Date().toLocaleTimeString('it-IT', { hour12: false }); }
        setInterval(updateClock, 1000);
        updateClock();
        initChart();
    </script>
</body>
</html>
