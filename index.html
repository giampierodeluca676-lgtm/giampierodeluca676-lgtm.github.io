<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>KEYGAP | TITAN TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #010204; }
        html, body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 0; width: 100%; overflow-x: hidden; overflow-y: auto; }
        .neon-text { color: var(--neon); text-shadow: 0 0 15px rgba(0, 242, 255, 0.7); font-family: 'Orbitron', sans-serif; }
        
        .terminal-grid { display: flex; flex-direction: column; padding: 15px; gap: 20px; width: 100%; }
        
        /* CARD DESTRA - RESA PIÙ GRANDE */
        .side-panel { background: rgba(0, 242, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.1); padding: 25px; border-radius: 8px; }
        .market-status-box { border: 1px solid rgba(0, 242, 255, 0.4); background: rgba(0, 0, 0, 0.5); padding: 20px; margin: 15px 0; box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.1); }
        
        .status-grid { display: grid; grid-template-columns: 1fr; gap: 12px; font-family: 'Orbitron'; font-size: 14px; }
        .status-item { border-bottom: 1px solid rgba(0, 242, 255, 0.2); padding: 8px 0; display: flex; justify-content: space-between; }
        .status-label { color: var(--neon); font-size: 11px; letter-spacing: 2px; }
        .status-value { color: #fff; font-weight: bold; }

        .btn-asset { background: rgba(0, 242, 255, 0.1); border: 1px solid var(--neon); padding: 15px; font-family: 'Orbitron'; font-size: 12px; transition: all 0.3s; }
        .btn-asset:hover { background: var(--neon); color: #000; }

        @media (min-width: 1024px) {
            .terminal-grid { display: grid; grid-template-columns: 1fr 450px; padding: 30px; gap: 30px; height: 100vh; }
            .side-panel { grid-column: 2; height: fit-content; }
        }
    </style>
</head>
<body>
    <div class="terminal-grid">
        <header class="flex justify-between items-center opacity-70 col-span-2">
            <div><div class="neon-text text-[10px] tracking-[4px]">SYSTEM_DATE</div><div id="date" class="text-xl">--/--/----</div></div>
            <div class="text-right"><div class="neon-text text-[10px] tracking-[4px]">LOCAL_TIME</div><div id="clock" class="text-xl">00:00:00</div></div>
        </header>

        <div class="chart-frame border border-white/10 rounded">
            <div id="tradingview_chart" style="height: 600px;"></div>
        </div>

        <div class="side-panel">
            <h1 class="neon-text text-4xl mb-6">KEYGAP<span class="text-white">_TITAN</span></h1>
            
            <div class="market-status-box">
                <div class="neon-text text-[11px] mb-4 tracking-[3px] border-b border-neon pb-2">LIVE MARKET DATA</div>
                <div class="status-grid">
                    <div class="status-item"><span class="status-label">ENGINE_STATUS</span><span id="m-status" class="status-value">OFFLINE</span></div>
                    <div class="status-item"><span class="status-label">BTC_PRICE</span><span id="m-price" class="status-value">---</span></div>
                    <div class="status-item"><span class="status-label">CORE_SIGNAL</span><span id="m-signal" class="status-value">---</span></div>
                    <div class="status-item"><span class="status-label">ACCURACY</span><span id="m-reliability" class="status-value">---</span></div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-6">
                <button onclick="switchSymbol('BITSTAMP:BTCUSD')" class="btn-asset">BITCOIN</button>
                <button onclick="switchSymbol('TVC:GOLD')" class="btn-asset">GOLD</button>
                <button onclick="switchSymbol('SP:SPX')" class="btn-asset">S&P 500</button>
                <button onclick="switchSymbol('FX:EURUSD')" class="btn-asset">EUR/USD</button>
            </div>
            
            <button onclick="window.location.href='editoriale.html'" class="w-full border-2 border-neon p-4 font-bold hover:bg-neon hover:text-black transition">ACCEDI AL TERMINALE NOTIZIE</button>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        async function loadMarketStatus() {
            try {
                // Il parametro v= serve a forzare il browser a non usare la cache vecchia
                const response = await fetch('market_status.json?v=' + Math.random());
                const data = await response.json();
                document.getElementById('m-status').textContent = data.status;
                document.getElementById('m-price').textContent = data.price;
                document.getElementById('m-signal').textContent = data.signal;
                document.getElementById('m-reliability').textContent = data.reliability;
            } catch (e) { console.log("Data sync error"); }
        }

        function initChart(symbol = 'BITSTAMP:BTCUSD') {
            new TradingView.widget({ "width": "100%", "height": "100%", "symbol": symbol, "interval": "D", "theme": "dark", "container_id": "tradingview_chart", "hide_side_toolbar": true });
        }

        function updateDateTime() { 
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT');
            document.getElementById('date').textContent = now.toLocaleDateString('it-IT');
        }

        setInterval(updateDateTime, 1000);
        setInterval(loadMarketStatus, 30000);
        updateDateTime();
        initChart();
        loadMarketStatus();
    </script>
</body>
</html>
