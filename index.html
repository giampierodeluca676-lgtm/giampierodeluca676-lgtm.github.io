<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KEYGAP | TITAN NEON</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #020408; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; min-height: 100vh; overflow: hidden; background-image: radial-gradient(circle at 50% 50%, #0a111a 0%, #020408 100%); }
        .neon-text { color: var(--neon); text-shadow: 0 0 20px rgba(0, 242, 255, 0.8); font-family: 'Orbitron'; }
        
        /* Interfaccia a Schermi Sospesi */
        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 20px;
            box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.05), 0 10px 40px rgba(0,0,0,0.7);
        }

        .header-main { padding: 30px; text-align: center; position: relative; }
        .header-main::after { content: ''; position: absolute; bottom: 0; left: 10%; width: 80%; height: 1px; background: linear-gradient(90deg, transparent, var(--neon), transparent); }

        .titan-grid { display: grid; grid-template-columns: 1fr; gap: 25px; padding: 20px; height: calc(100vh - 180px); }

        /* Il Grafico Moderno - Area Estesa */
        .chart-container { position: relative; overflow: hidden; }
        
        /* Overlay per nascondere i loghi e rendere il look più pulito */
        .chart-mask { position: absolute; bottom: 0; left: 0; width: 100%; height: 30px; background: var(--bg); z-index: 10; }

        .data-card { padding: 30px; display: flex; flex-direction: column; justify-content: center; }
        .data-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(0,242,255,0.1); }
        .data-label { font-family: 'Orbitron'; font-size: 12px; color: rgba(0, 242, 255, 0.6); }
        .data-value { font-family: 'Orbitron'; font-size: 18px; font-weight: 900; }

        .btn-titan {
            background: linear-gradient(135deg, rgba(0,242,255,0.1) 0%, transparent 100%);
            border: 1px solid var(--neon);
            padding: 20px;
            border-radius: 12px;
            font-family: 'Orbitron';
            font-weight: 900;
            color: var(--neon);
            transition: 0.4s;
            text-align: center;
        }
        .btn-titan:hover { background: var(--neon); color: #000; box-shadow: 0 0 30px var(--neon); transform: translateY(-3px); }

        @media (min-width: 1024px) {
            .titan-grid { grid-template-columns: 2.5fr 1fr; padding: 40px; }
        }
    </style>
</head>
<body>

    <header class="header-main">
        <div class="neon-text text-7xl font-black italic tracking-[-5px]">KEYGAP</div>
        <div class="flex justify-center gap-10 mt-4 font-bold">
            <div id="date" class="text-2xl opacity-50 uppercase tracking-[5px]">--/--/----</div>
            <div id="clock" class="text-2xl neon-text tracking-[5px]">00:00:00</div>
        </div>
    </header>

    <div class="titan-grid">
        <div class="glass-panel chart-container">
            <div id="tradingview_advanced" style="width: 100%; height: 100%;"></div>
            <div class="chart-mask"></div>
        </div>

        <div class="glass-panel data-card">
            <div class="mb-10 text-center">
                <div class="text-[10px] tracking-[10px] text-cyan-500 font-bold uppercase mb-2">Neural_Core_Status</div>
                <div id="m-status" class="text-4xl font-black neon-text uppercase">ONLINE</div>
            </div>
            
            <div class="space-y-2 mb-10">
                <div class="data-item"><span class="data-label">MARKET_PRICE</span><span id="m-price" class="data-value">---</span></div>
                <div class="data-item"><span class="data-label">SIGNAL_TYPE</span><span id="m-signal" class="data-value">---</span></div>
                <div class="data-item"><span class="data-label">ACCURACY</span><span id="m-reliability" class="data-value">---</span></div>
            </div>

            <div class="grid grid-cols-2 gap-4 mt-auto">
                <button onclick="switchSymbol('BITSTAMP:BTCUSD')" class="btn-titan text-xs">BITCOIN</button>
                <button onclick="switchSymbol('TVC:GOLD')" class="btn-titan text-xs">GOLD</button>
            </div>
            <button onclick="window.location.href='editoriale.html'" class="btn-titan mt-4 w-full">INTELLIGENCE TERMINAL ►</button>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT');
            document.getElementById('date').textContent = now.toLocaleDateString('it-IT');
        }

        async function loadData() {
            try {
                const r = await fetch('./market_status.json?v=' + Date.now());
                const d = await r.json();
                document.getElementById('m-status').textContent = d.status || "STANDBY";
                document.getElementById('m-price').textContent = d.price || "---";
                document.getElementById('m-signal').textContent = d.signal || "---";
                document.getElementById('m-reliability').textContent = d.reliability || "---";
            } catch (e) {}
        }

        function initChart(s = 'BITSTAMP:BTCUSD') {
            new TradingView.widget({
                "autosize": true,
                "symbol": s,
                "interval": "D",
                "timezone": "Europe/Rome",
                "theme": "dark",
                "style": "8", // STILE HEIKIN-ASHI: Le candele più fluide e moderne al mondo
                "locale": "it",
                "toolbar_bg": "rgba(0,0,0,0)",
                "enable_publishing": false,
                "hide_top_toolbar": false,
                "hide_legend": true,
                "save_image": false,
                "container_id": "tradingview_advanced",
                "backgroundColor": "rgba(2, 4, 8, 1)",
                "gridColor": "rgba(0, 242, 255, 0.05)",
                "withdateranges": true,
                "details": false,
                "hotlist": false,
                "calendar": false,
                "studies": [ "STDDEV@tv-basicstudies" ], // Aggiunge volatilità in modo elegante
                "overrides": {
                    "mainSeriesProperties.style": 8,
                    "paneProperties.background": "#020408",
                    "paneProperties.vertGridProperties.color": "rgba(0, 242, 255, 0.02)",
                    "paneProperties.horzGridProperties.color": "rgba(0, 242, 255, 0.02)"
                }
            });
        }

        function switchSymbol(s) { initChart(s); }
        
        setInterval(updateTime, 1000);
        setInterval(loadData, 5000);
        updateTime(); initChart(); loadData();
    </script>
</body>
</html>
