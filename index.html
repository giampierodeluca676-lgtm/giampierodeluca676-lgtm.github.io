<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>KEYGAP | TITAN TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #010204; --card-bg: rgba(10, 15, 25, 0.9); }
        html, body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 0; width: 100%; overflow-x: hidden; }
        .neon-text { color: var(--neon); text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); font-family: 'Orbitron', sans-serif; }
        
        /* CARD IN RILIEVO */
        .side-panel { 
            background: var(--card-bg); 
            border: 2px solid var(--neon); 
            padding: 30px; 
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.2), inset 0 0 15px rgba(0, 242, 255, 0.1);
            transform: translateY(-5px); /* Effetto sollevato */
        }

        .market-status-box { 
            border: 1px solid rgba(0, 242, 255, 0.5); 
            background: rgba(0, 0, 0, 0.8); 
            padding: 25px; 
            margin: 20px 0; 
            border-radius: 8px;
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.5); /* Ombra per rilievo */
        }
        
        .status-grid { display: grid; grid-template-columns: 1fr; gap: 15px; font-family: 'Orbitron'; font-size: 15px; }
        .status-item { border-bottom: 1px solid rgba(0, 242, 255, 0.15); padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .status-label { color: var(--neon); font-size: 12px; letter-spacing: 2px; opacity: 0.8; }
        .status-value { color: #fff; font-weight: bold; text-shadow: 0 0 5px #fff; }

        .btn-asset { 
            background: rgba(0, 242, 255, 0.05); 
            border: 1px solid var(--neon); 
            padding: 15px; 
            font-family: 'Orbitron'; 
            font-size: 12px; 
            border-radius: 4px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }
        .btn-asset:active { transform: translateY(2px); box-shadow: none; }

        .chart-frame { 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; 
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        @media (min-width: 1024px) {
            .terminal-grid { display: grid; grid-template-columns: 1fr 480px; padding: 40px; gap: 40px; min-height: 100vh; align-items: start; }
        }
    </style>
</head>
<body>
    <div class="terminal-grid flex flex-col p-5 gap-6">
        <header class="flex justify-between items-center opacity-80 mb-4">
            <div><div class="neon-text text-[10px] tracking-[4px]">SYSTEM_DATA</div><div id="date" class="text-xl font-bold">--/--/----</div></div>
            <div class="text-right"><div class="neon-text text-[10px] tracking-[4px]">LOCAL_TIME</div><div id="clock" class="text-xl font-bold">00:00:00</div></div>
        </header>

        <div class="chart-frame bg-black">
            <div id="tradingview_chart" style="height: 650px;"></div>
        </div>

        <div class="side-panel">
            <h1 class="neon-text text-5xl mb-8 tracking-tighter italic">KEYGAP<span class="text-white not-italic">_TITAN</span></h1>
            
            <div class="market-status-box">
                <div class="neon-text text-[12px] mb-5 tracking-[4px] border-b border-neon/30 pb-2">LIVE MARKET TERMINAL</div>
                <div class="status-grid">
                    <div class="status-item"><span class="status-label">ENGINE</span><span id="m-status" class="status-value text-green-400">CONNECTING...</span></div>
                    <div class="status-item"><span class="status-label">PRICE</span><span id="m-price" class="status-value">---</span></div>
                    <div class="status-item"><span class="status-label">SIGNAL</span><span id="m-signal" class="status-value">---</span></div>
                    <div class="status-item"><span class="status-label">ACCURACY</span><span id="m-reliability" class="status-value">---</span></div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <button onclick="switchSymbol('BITSTAMP:BTCUSD')" class="btn-asset">BITCOIN</button>
                <button onclick="switchSymbol('TVC:GOLD')" class="btn-asset">GOLD</button>
                <button onclick="switchSymbol('SP:SPX')" class="btn-asset">S&P 500</button>
                <button onclick="switchSymbol('FX:EURUSD')" class="btn-asset">EUR/USD</button>
            </div>
            
            <button onclick="window.location.href='editoriale.html'" class="w-full border-2 border-neon p-5 font-black hover:bg-neon hover:text-black transition uppercase tracking-[3px] shadow-[0_0_20px_rgba(0,242,255,0.3)]">Accedi Terminale Notizie</button>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        async function loadMarketStatus() {
            try {
                // Il timestamp impedisce al browser di caricare dati vecchi (CACHE)
                const timestamp = new Date().getTime();
                const response = await fetch('market_status.json?nocache=' + timestamp);
                if (!response.ok) throw new Error('File non trovato');
                const data = await response.json();
                
                document.getElementById('m-status').textContent = data.status;
                document.getElementById('m-price').textContent = data.price;
                document.getElementById('m-signal').textContent = data.signal;
                document.getElementById('m-reliability').textContent = data.reliability;
                
                // Colore dinamico per lo stato
                document.getElementById('m-status').className = data.status === "OPERATIVO" ? "status-value text-green-400" : "status-value text-red-400";
            } catch (e) { 
                console.log("Sync Wait..."); 
            }
        }

        function initChart(symbol = 'BITSTAMP:BTCUSD') {
            new TradingView.widget({ "width": "100%", "height": "100%", "symbol": symbol, "interval": "D", "theme": "dark", "container_id": "tradingview_chart", "style": "1", "hide_side_toolbar": true });
        }

        function updateDateTime() { 
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT');
            document.getElementById('date').textContent = now.toLocaleDateString('it-IT');
        }

        setInterval(updateDateTime, 1000);
        setInterval(loadMarketStatus, 10000); // Controlla nuovi dati ogni 10 secondi
        updateDateTime();
        initChart();
        loadMarketStatus();
    </script>
</body>
</html>
