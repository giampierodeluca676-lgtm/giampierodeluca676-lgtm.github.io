<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEYGAP | PURE QUANTUM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #010204; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; overflow: hidden; perspective: 1500px; height: 100vh; }
        .neon-text { color: var(--neon); text-shadow: 0 0 15px rgba(0, 242, 255, 0.7); font-family: 'Orbitron', sans-serif; }
        
        /* Layout Strutturale */
        .terminal-grid { display: grid; grid-template-rows: auto auto 1fr auto; height: 100vh; padding: 20px 40px; gap: 20px; }

        /* Titolo 3D compatto */
        .main-title { font-size: 2.5rem; font-weight: 900; text-transform: uppercase; font-style: italic; letter-spacing: -1px; text-align: center; }
        .main-title span { color: var(--neon); text-shadow: 0 0 25px rgba(0, 242, 255, 0.4); }

        /* Navigazione Cockpit */
        .btn-asset { background: rgba(0,0,0,0.6); border: 1px solid rgba(0, 242, 255, 0.2); padding: 10px 25px; font-family: 'Orbitron'; font-size: 10px; letter-spacing: 2px; transition: 0.4s; }
        .btn-asset:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); transform: translateZ(30px); }
        .btn-terminal { border: 2px solid var(--neon); padding: 12px 40px; font-family: 'Orbitron'; font-size: 11px; letter-spacing: 6px; background: rgba(0, 242, 255, 0.05); transition: 0.5s; }
        .btn-terminal:hover { background: var(--neon); color: #000; box-shadow: 0 0 40px var(--neon); transform: translateZ(50px); }

        /* Pannello Grafico Imponente */
        .chart-frame { background: rgba(10, 11, 13, 0.9); border: 1px solid rgba(255,255,255,0.05); border-radius: 4px; position: relative; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: 0 40px 100px rgba(0,0,0,0.9); }
        .chart-frame:hover { transform: rotateX(1deg) translateZ(10px); border-color: rgba(0, 242, 255, 0.2); }
        .panel-header { background: rgba(22, 27, 34, 0.8); padding: 8px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .page-exit { opacity: 0; filter: blur(40px); transform: scale(1.2) rotateX(25deg); transition: 1s ease; }
    </style>
</head>
<body>
    <div class="terminal-grid">
        <header class="flex justify-between items-center opacity-60">
            <div><div class="neon-text text-[9px] tracking-[5px]">CORE://ACTIVE</div><div id="clock" class="text-xl font-light text-white/40">00:00:00</div></div>
            <div class="text-right"><div class="neon-text text-[9px] tracking-[4px]">KEYGAP_ADVANTAGE</div><div class="text-[8px] text-white/20">QUANTUM ANALYTICS</div></div>
        </header>

        <div class="flex flex-col items-center gap-6">
            <h1 class="main-title"><span>Keygap</span> Advantage</h1>
            <div class="flex flex-col items-center gap-4">
                <div class="flex gap-4">
                    <button onclick="switchSymbol('BITSTAMP:BTCUSD')" class="btn-asset uppercase font-bold">Bitcoin</button>
                    <button onclick="switchSymbol('TVC:GOLD')" class="btn-asset uppercase font-bold">Gold</button>
                    <button onclick="switchSymbol('SP:SPX')" class="btn-asset uppercase font-bold">S&P 500</button>
                    <button onclick="switchSymbol('FX:EURUSD')" class="btn-asset uppercase font-bold">EUR / USD</button>
                </div>
                <button onclick="startTransition()" class="btn-terminal font-black uppercase">> Terminale Notizie</button>
            </div>
        </div>

        <div class="chart-frame">
            <div class="panel-header flex justify-between items-center">
                <span id="chart-title" class="neon-text text-[10px] tracking-[5px]">DATASTREAM // BTCUSD</span>
                <span class="text-[8px] text-white/30 tracking-[2px]">REAL-TIME EXECUTION</span>
            </div>
            <div id="tradingview_chart" style="height: calc(100% - 40px); width: 100%;"></div>
        </div>

        <footer class="text-center opacity-10 pb-4"><div class="neon-text text-[8px] tracking-[25px]">Keygap Terminal</div></footer>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let widget;
        function initChart(symbol = 'BITSTAMP:BTCUSD') {
            widget = new TradingView.widget({
                "width": "100%", "height": "100%", "symbol": symbol, "interval": "D", "timezone": "Etc/UTC", "theme": "dark", "style": "1", "locale": "it", "enable_publishing": false, "backgroundColor": "#010204", "gridColor": "rgba(0, 242, 255, 0.03)", "allow_symbol_change": true, "container_id": "tradingview_chart"
            });
        }
        function switchSymbol(symbol) {
            document.getElementById('chart-title').textContent = 'DATASTREAM // ' + symbol.split(':')[1];
            initChart(symbol);
        }
        function startTransition() {
            document.body.classList.add('page-exit');
            setTimeout(() => { window.location.href = "editoriale.html"; }, 1000);
        }
        function updateClock() { document.getElementById('clock').textContent = new Date().toLocaleTimeString('it-IT', { hour12: false }); }
        setInterval(updateClock, 1000); updateClock(); initChart();
    </script>
</body>
</html>
