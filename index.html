<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KEYGAP | TITAN TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #020406; --glass: rgba(15, 23, 42, 0.8); }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Terminal Header */
        .term-header { background: #000; border-bottom: 2px solid var(--neon); padding: 10px 20px; box-shadow: 0 0 20px rgba(0,242,255,0.2); z-index: 50; }
        .neon-title { font-family: 'Orbitron'; color: var(--neon); text-shadow: 0 0 10px var(--neon); letter-spacing: 5px; }

        /* Glass Graph Container */
        .graph-master-container {
            flex: 1; position: relative; margin: 15px; border-radius: 15px;
            background: var(--glass); border: 1px solid rgba(0, 242, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 0 30px rgba(0, 242, 255, 0.05);
            backdrop-filter: blur(10px); display: flex; flex-direction: column;
        }

        .graph-top-bar {
            padding: 10px 20px; background: rgba(0,0,0,0.4); border-bottom: 1px solid rgba(0,242,255,0.1);
            display: flex; justify-content: space-between; align-items: center; border-radius: 15px 15px 0 0;
        }

        .status-dot { width: 8px; height: 8px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 10px #00ff88; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Bot Side Card - Floating */
        .bot-overlay {
            position: absolute; bottom: 20px; right: 20px; width: 280px;
            background: rgba(0,0,0,0.9); border: 1px solid var(--neon); padding: 15px;
            border-radius: 10px; z-index: 100; box-shadow: 0 0 30px rgba(0,0,0,1);
        }

        .btn-action {
            background: rgba(0,242,255,0.1); border: 1px solid var(--neon); color: var(--neon);
            font-family: 'Orbitron'; font-size: 10px; padding: 10px; width: 100%; transition: 0.3s;
        }
        .btn-action:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }
    </style>
</head>
<body>

    <header class="term-header flex justify-between items-center">
        <div class="neon-title text-2xl font-black italic">KEYGAP_TITAN</div>
        <div class="flex gap-6 items-center">
            <div class="text-right">
                <div id="date" class="text-xs text-gray-500 font-bold uppercase tracking-tighter">--/--/----</div>
                <div id="clock" class="text-xl font-bold tracking-tighter">00:00:00</div>
            </div>
            <div class="status-dot"></div>
        </div>
    </header>

    <main class="graph-master-container">
        <div class="graph-top-bar">
            <div class="flex items-center gap-4">
                <span class="text-[10px] font-bold tracking-[3px] text-cyan-500">ENGINE://STREAMING_LIVE</span>
                <span id="active-symbol" class="bg-cyan-900/50 px-2 py-1 rounded text-[10px] text-white font-mono">BTCUSD</span>
            </div>
            <div class="flex gap-2">
                <button onclick="switchSymbol('BITSTAMP:BTCUSD')" class="text-[9px] border border-white/20 px-2 py-1 hover:border-cyan-400 transition">BTC</button>
                <button onclick="switchSymbol('TVC:GOLD')" class="text-[9px] border border-white/20 px-2 py-1 hover:border-cyan-400 transition">GOLD</button>
            </div>
        </div>
        
        <div id="tradingview_widget" class="flex-1"></div>

        <div class="bot-overlay">
            <div class="flex justify-between items-center mb-4 border-b border-white/10 pb-2">
                <span class="text-[10px] font-bold tracking-widest text-cyan-500">BOT_CORE_V3</span>
                <span id="m-status" class="text-[9px] text-green-400 font-bold">READY</span>
            </div>
            <div class="grid grid-cols-2 gap-4 text-[11px] mb-4 font-mono">
                <div><span class="text-gray-500">PRICE:</span><br><span id="m-price" class="text-white">---</span></div>
                <div><span class="text-gray-500">SIGNAL:</span><br><span id="m-signal" class="text-white">---</span></div>
            </div>
            <button onclick="window.location.href='editoriale.html'" class="btn-action">GO TO NEWS TERMINAL ►</button>
        </div>
    </main>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT');
            document.getElementById('date').textContent = now.toLocaleDateString('it-IT');
        }
        
        async function loadBotData() {
            try {
                const r = await fetch('./market_status.json?v=' + Date.now());
                const d = await r.json();
                document.getElementById('m-status').textContent = d.status || "IDLE";
                document.getElementById('m-price').textContent = d.price || "---";
                document.getElementById('m-signal').textContent = d.signal || "---";
            } catch (e) { console.log("Syncing..."); }
        }

        function initChart(symbol = 'BITSTAMP:BTCUSD') {
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": "D",
                "timezone": "Europe/Rome",
                "theme": "dark",
                "style": "1",
                "locale": "it",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_side_toolbar": false,
                "allow_symbol_change": true,
                "container_id": "tradingview_widget",
                "studies": ["MASimple@tv-basicstudies"],
                "disabled_features": ["header_screenshot", "header_symbol_search"],
                "overrides": {
                    "paneProperties.background": "#020406",
                    "paneProperties.vertGridProperties.color": "rgba(0, 242, 255, 0.02)",
                    "paneProperties.horzGridProperties.color": "rgba(0, 242, 255, 0.02)"
                }
            });
            document.getElementById('active-symbol').textContent = symbol.split(':')[1];
        }

        function switchSymbol(s) { initChart(s); }

        setInterval(updateTime, 1000);
        setInterval(loadBotData, 5000);
        updateTime();
        initChart();
        loadBotData();
    </script>
</body>
</html>
