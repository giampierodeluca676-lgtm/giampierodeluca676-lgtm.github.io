<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEYGAP | Financial Intelligence Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --panel: #0d1117; --acc: #00e5ff; --border: rgba(0, 229, 255, 0.2); }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; margin: 0; padding: 20px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px; background: var(--panel); border: 1px solid var(--border); 
            border-radius: 15px; margin-bottom: 20px; box-shadow: 0 0 30px rgba(0, 229, 255, 0.1);
        }
        
        .logo { font-size: 2.2rem; font-weight: 900; color: var(--acc); font-family: 'JetBrains Mono'; letter-spacing: -2px; }
        
        .grid { display: grid; grid-template-columns: 400px 1fr; gap: 20px; flex-grow: 1; margin-bottom: 20px; }
        
        .card { 
            background: var(--panel); border: 1px solid var(--border); 
            border-radius: 20px; padding: 30px; display: flex; flex-direction: column;
        }

        .news-text { font-size: 1.4rem; font-weight: 700; line-height: 1.6; color: #e2e8f0; border-left: 3px solid var(--acc); padding-left: 20px; }
        
        .btn-access { 
            background: var(--acc); color: #000; padding: 25px; border-radius: 15px; 
            font-weight: 900; font-size: 1.6rem; cursor: pointer; text-transform: uppercase; 
            text-align: center; text-decoration: none; transition: 0.4s; border: none;
            box-shadow: 0 10px 40px rgba(0, 229, 255, 0.2);
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .btn-access span { font-size: 0.7rem; font-family: 'JetBrains Mono'; opacity: 0.7; letter-spacing: 2px; }
        .btn-access:hover { transform: translateY(-5px); filter: brightness(1.2); box-shadow: 0 15px 50px rgba(0, 229, 255, 0.4); }
        
        #live-btc { font-family: 'JetBrains Mono'; font-size: 2rem; color: #00ff88; font-weight: 700; text-shadow: 0 0 15px rgba(0, 255, 136, 0.3); }
        .status-tag { font-size: 0.7rem; font-family: 'JetBrains Mono'; color: var(--acc); letter-spacing: 3px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <header>
        <div class="logo">KEYGAP_ADVANTAGE</div>
        <div id="live-btc">BTC: CONNECTING...</div>
    </header>

    <div class="grid">
        <div class="card">
            <div class="status-tag">SYSTEM_CORE_STATUS: ACTIVE</div>
            <div class="news-text">
                ANALISI FLUSSI GLOBALI IN CORSO.<br>
                Sincronizzazione nodi completata.<br>
                Monitoraggio Asset High-Volatility attivo.
            </div>
            <div style="margin-top:auto; font-family:'JetBrains Mono'; color:rgba(255,255,255,0.3); font-size:0.8rem;">
                DATABASE AGGIORNATO: <span id="current-time"></span>
            </div>
        </div>
        <div class="card" style="padding:0; overflow:hidden;">
            <div id="tv_widget" style="height: 100%;"></div>
            <script src="https://s3.tradingview.com/tv.js"></script>
            <script>
                new TradingView.widget({
                    "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "30",
                    "theme": "dark", "style": "1", "locale": "it", "container_id": "tv_widget",
                    "enable_publishing": false, "hide_top_toolbar": true, "save_image": false
                });
            </script>
        </div>
    </div>

    <a href="archivio.html" class="btn-access">
        <span>INTELLIGENCE DATABASE</span>
        ENTRA NELL'ARCHIVIO REPORT ORDINATO
    </a>

    <script>
        // Update Time
        document.getElementById('current-time').innerText = new Date().toLocaleString();

        // WebSocket BTC
        const btcEl = document.getElementById('live-btc');
        const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            btcEl.innerText = `BTC: $ ${parseFloat(data.p).toLocaleString()}`;
        };
    </script>
</body>
</html>
