<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEYGAP | ELITE TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #010204; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; transition: all 0.8s ease; }
        .neon-glow { color: var(--neon); text-shadow: 0 0 20px rgba(0, 242, 255, 1); font-family: 'Orbitron', sans-serif; }
        .main-title { font-size: clamp(2rem, 6vw, 5.5rem); font-weight: 900; color: var(--neon); text-shadow: 0 0 40px rgba(0, 242, 255, 0.5); line-height: 0.9; margin: 50px 0; font-style: italic; }
        .quant-panel { background: #0a0b0d; border: 1px solid #1e293b; border-radius: 4px; position: relative; }
        .panel-header { background: #161b22; padding: 8px 15px; border-bottom: 1px solid #1e293b; }
        .chart-container { height: 600px; width: 100%; }
        .heatmap-box { height: 400px; width: 100%; }
        .page-exit { opacity: 0; filter: blur(20px); transform: scale(1.1); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-[1600px] mx-auto">
        <header class="flex justify-between items-start mb-10">
            <div>
                <div class="neon-glow text-xs tracking-[10px] mb-2">SYSTEM STATUS: OPERATIONAL</div>
                <div id="clock" class="text-3xl font-light tracking-tighter text-white/40">00:00:00</div>
            </div>
            <div class="text-right">
                <div class="neon-glow text-xs tracking-[5px]">KEYGAP AD-VANTAGE</div>
                <div class="text-[10px] text-white/20 uppercase">High-Frequency Intelligence</div>
            </div>
        </header>

        <h1 class="main-title text-center uppercase tracking-[-2px]">Keygap<br><span class="text-white">AdVantage</span></h1>

        <div class="flex flex-col items-center gap-6 mb-12">
            <div class="flex flex-wrap justify-center gap-4">
                <button onclick="switchSymbol('BITSTAMP:BTCUSD')" class="px-6 py-2 border border-[#00f2ff] text-[#00f2ff] font-bold tracking-widest hover:bg-[#00f2ff] hover:text-black transition-all duration-500 uppercase text-xs">Bitcoin</button>
                <button onclick="switchSymbol('TVC:GOLD')" class="px-6 py-2 border border-[#00f2ff] text-[#00f2ff] font-bold tracking-widest hover:bg-[#00f2ff] hover:text-black transition-all duration-500 uppercase text-xs">Gold</button>
                <button onclick="switchSymbol('SP:SPX')" class="px-6 py-2 border border-[#00f2ff] text-[#00f2ff] font-bold tracking-widest hover:bg-[#00f2ff] hover:text-black transition-all duration-500 uppercase text-xs">S&P 500</button>
                <button onclick="switchSymbol('FX:EURUSD')" class="px-6 py-2 border border-[#00f2ff] text-[#00f2ff] font-bold tracking-widest hover:bg-[#00f2ff] hover:text-black transition-all duration-500 uppercase text-xs">EUR / USD</button>
            </div>
            <div class="flex justify-center">
                <button onclick="startTransition()" class="px-12 py-3 border-2 border-[#00f2ff] text-[#00f2ff] font-bold tracking-[8px] hover:bg-[#00f2ff] hover:text-black transition-all duration-500 uppercase text-[10px] bg-[#00f2ff]/10">
                    > TERMINALE NOTIZIE
                </button>
            </div>
        </div>

        <div class="quant-panel mb-10">
            <div class="panel-header flex justify-between items-center">
                <span id="chart-title" class="neon-glow text-[11px] tracking-[5px]">MARKET ANALYTICS // BTCUSD</span>
            </div>
            <div id="tradingview_chart" class="chart-container"></div>
        </div>

        <div class="quant-panel mb-20">
            <div class="panel-header"><span class="neon-glow text-[11px] tracking-[5px]">Global Asset Distribution Heatmap</span></div>
            <div class="heatmap-box">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-crypto-coins-heatmap.js" async>
                { "symbolGroups": [ { "name": "Market Leaders", "symbols": [ { "name": "BINANCE:BTCUSDT" }, { "name": "BINANCE:ETHUSDT" }, { "name": "BINANCE:SOLUSDT" }, { "name": "BINANCE:BNBUSDT" }, { "name": "BINANCE:XRPUSDT" } ] } ], "colorTheme": "dark", "isTransparent": false, "hasSymbolTooltip": true, "locale": "it", "displayMode": "regular", "width": "100%", "height": "100%" }
                </script>
            </div>
        </div>
    </div>

    <footer class="text-center py-20 border-t border-white/5 opacity-20"><div class="neon-glow text-[10px] tracking-[20px]">Keygap Terminal</div></footer>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let widget;
        function initChart(symbol = 'BITSTAMP:BTCUSD') {
            widget = new TradingView.widget({
                "width": "100%", "height": "100%", "symbol": symbol, "interval": "D", "timezone": "Etc/UTC", "theme": "dark", "style": "1", "locale": "it", "toolbar_bg": "#f1f3f6", "enable_publishing": false, "hide_side_toolbar": false, "allow_symbol_change": true, "container_id": "tradingview_chart"
            });
        }
        function switchSymbol(symbol) {
            document.getElementById('chart-title').textContent = 'MARKET ANALYTICS // ' + symbol.split(':')[1];
            initChart(symbol);
        }
        function startTransition() {
            document.body.classList.add('page-exit');
            setTimeout(() => { window.location.href = "editoriale.html"; }, 800);
        }
        function updateClock() { document.getElementById('clock').textContent = new Date().toLocaleTimeString('it-IT', { hour12: false }); }
        setInterval(updateClock, 1000);
        updateClock();
        initChart();
    </script>
</body>
</html>
