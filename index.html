<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Keygap Advantage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono:wght@700&display=swap');
        body { background: #050505; color: #e5e7eb; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .panel { background: rgba(18, 18, 18, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem; }
        .bento-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; padding: 1rem; }
        @media (max-width: 640px) { .bento-grid { grid-template-columns: 1fr 1fr; } .chart-col, .summary-col, .full-mobile { grid-column: span 2; } }
    </style>
</head>
<body>
<nav class="border-b border-white/5 py-4 px-6 flex justify-between items-center bg-black/40 sticky top-0 z-50">
    <h1 class="text-xl font-black italic uppercase">Keygap <span class="text-blue-500">Advantage</span></h1>
    <div class="text-right">
        <div id="live-clock" class="text-xl font-bold mono leading-none">00:00:00</div>
        <div id="live-date" class="text-[10px] text-blue-500 font-bold uppercase tracking-widest">---</div>
    </div>
</nav>

<main class="max-w-[1600px] mx-auto p-2">
    <div class="bento-grid">
        <div class="panel p-4 text-center">
            <span class="text-[10px] text-gray-500 uppercase font-bold">BTC Price</span>
            <div id="price" class="text-2xl font-black mono text-white">---</div>
        </div>
        <div class="panel p-4 text-center border-b-2 border-blue-500">
            <span class="text-[10px] text-gray-500 uppercase font-bold">Signal</span>
            <div id="signal" class="text-2xl font-black mono text-blue-400">---</div>
        </div>
        <div class="panel p-4 text-center border-l-2 border-yellow-500">
            <span class="text-[10px] text-gray-500 uppercase font-bold">Reliability</span>
            <div id="reliability-val" class="text-2xl font-black mono text-yellow-500">---</div>
        </div>
        <div class="panel p-4 bg-blue-600/10">
            <button onclick="toggleIntelligence()" class="w-full h-full font-black italic uppercase text-sm">Intelligence Report 📊</button>
        </div>
        <div class="panel chart-col md:col-span-3 md:row-span-4 min-h-[450px] overflow-hidden">
            <div id="main-chart" class="w-full h-full"></div>
        </div>
        <div class="panel summary-col md:col-span-1 md:row-span-4 flex flex-col p-4 overflow-hidden" style="height: 100%;">
            <h2 class="text-xs font-black text-red-500 uppercase mb-4">Live News Feed</h2>
            <div id="news-container" class="flex-1 overflow-y-auto space-y-4 text-xs pb-10"></div>
        </div>
    </div>
</main>

<div id="intelligence-overlay" class="fixed inset-0 z-[100] bg-black/98 invisible opacity-0 transition-all duration-300 overflow-y-auto p-4">
    <div class="max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-black uppercase italic">Intelligence <span class="text-red-600">Report</span></h2>
            <button onclick="toggleIntelligence()" class="text-3xl">&times;</button>
        </div>
        <div id="report-header-stats" class="grid grid-cols-3 gap-2 mb-6 p-3 bg-white/5 rounded-xl text-center border border-white/10"></div>
        <div id="reports-display-area" class="text-xs text-gray-400 leading-relaxed"></div>
    </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
new TradingView.widget({"autosize":true,"symbol":"BINANCE:BTCUSDT","interval":"1","theme":"dark","container_id":"main-chart"});
const priceEl = document.getElementById('price');
const btcSocket = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');
btcSocket.onmessage = (e) => {
    const d = JSON.parse(e.data);
    priceEl.innerText = '€ ' + parseFloat(d.c).toLocaleString('it-IT',{minimumFractionDigits:2});
};
async function sync() {
    try {
        const r = await fetch('market_status.json?v=' + Date.now());
        const d = await r.json();
        const s = document.getElementById('signal');
        s.innerText = d.signal;
        s.className = d.signal === "BULLISH" ? "text-2xl font-black mono text-green-500" : "text-2xl font-black mono text-red-500";
        document.getElementById('reliability-val').innerText = d.reliability;
        document.getElementById('news-container').innerHTML = d.news.map(n => `<div class="border-b border-white/5 pb-2"><span class="text-[9px] text-blue-500 font-bold">${n.time}</span><p class="italic text-[11px] leading-tight">${n.text}</p></div>`).join('');
    } catch(err) {}
}
async function loadIntelligenceReports() {
    const area = document.getElementById('reports-display-area');
    const header = document.getElementById('report-header-stats');
    header.innerHTML = `<div><span class="text-[8px] text-gray-500">PRICE</span><div class="text-xs font-bold">${priceEl.innerText}</div></div>
                        <div><span class="text-[8px] text-gray-500">SIGNAL</span><div class="text-xs font-bold">${document.getElementById('signal').innerText}</div></div>
                        <div><span class="text-[8px] text-gray-500">RELIABILITY</span><div class="text-xs font-bold text-yellow-500">${document.getElementById('reliability-val').innerText}</div></div>`;
    area.innerHTML = 'DECRIPTING...';
    const res = await fetch('latest_report.html?v=' + Date.now());
    area.innerHTML = await res.text();
}
function toggleIntelligence() {
    const o = document.getElementById('intelligence-overlay');
    o.classList.toggle('invisible'); o.classList.toggle('opacity-0');
    if(!o.classList.contains('invisible')) loadIntelligenceReports();
}
function updateTime() {
    const n = new Date();
    document.getElementById('live-clock').innerText = n.toLocaleTimeString('it-IT');
    document.getElementById('live-date').innerText = n.toLocaleDateString('it-IT').toUpperCase();
}
setInterval(updateTime, 1000); setInterval(sync, 10000); updateTime(); sync();
</script>
</body>
</html>
