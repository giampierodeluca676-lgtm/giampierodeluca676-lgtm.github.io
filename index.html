<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keygap Advantage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .ticker-wrap { background: #000; color: #3b82f6; padding: 10px 0; overflow: hidden; border-bottom: 1px solid #1e40af; }
        .ticker-move { display: inline-block; white-space: nowrap; animation: scroll 30s linear infinite; font-family: monospace; }
    </style>
</head>
<body class="bg-black text-white font-sans">

    <div class="ticker-wrap">
        <div class="ticker-move" id="ticker-text">
            CONNESSO AD ASTERRA • STATUS: LIVE • MARKET DATA ACTIVE • KEYGAP ADVANTAGE • 
        </div>
    </div>

    <div class="p-6 flex justify-between items-center max-w-6xl mx-auto">
        <h1 class="text-3xl font-black tracking-tighter text-blue-600">KEYGAP <span class="text-white">ADV</span></h1>
        <div class="text-right">
            <p id="live-clock" class="text-3xl font-mono font-bold">00:00:00</p>
            <p class="text-[10px] text-blue-500 uppercase">System Time</p>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-4 pb-10">
        <div class="bg-gray-900 rounded-3xl overflow-hidden border border-gray-800 shadow-2xl" style="height: 600px;">
            <div id="tv-widget" style="height: 100%;"></div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Orologio fluido che non si ferma mai
        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('it-IT');
        }, 1000);

        // Grafico con ricerca nativa (clicca sul nome in alto a sx del grafico)
        new TradingView.widget({
            "autosize": true,
            "symbol": "BINANCE:BTCUSDT",
            "interval": "D",
            "theme": "dark",
            "style": "1",
            "locale": "it",
            "allow_symbol_change": true,
            "container_id": "tv-widget"
        });

        // Legge gli aggiornamenti da Asterra/Bot se presenti
        async function checkUpdates() {
            try {
                const r = await fetch('market_status.json?v=' + Date.now());
                const d = await r.json();
                if(d.ticker) document.getElementById('ticker-text').innerText = d.ticker.repeat(3);
            } catch (e) {}
        }
        setInterval(checkUpdates, 10000);
    </script>
</body>
</html>
