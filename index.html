
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEYGAP | 3D QUANTUM DESK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #0a0b10; }
        body { 
            background: radial-gradient(circle at center, #1b1e29 0%, #0a0b10 100%);
            color: #e0e6ed; font-family: 'Rajdhani', sans-serif;
            perspective: 1500px; overflow-x: hidden;
        }
        .card-3d {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            transform: rotateX(10deg) rotateY(-5deg);
            box-shadow: 20px 20px 50px rgba(0,0,0,0.5), inset 1px 1px 0px rgba(255,255,255,0.1);
            transition: all 0.5s ease;
        }
        .card-3d:hover {
            transform: rotateX(0deg) rotateY(0deg) translateZ(20px);
            border-color: var(--neon);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }
        .neon-text { color: var(--neon); text-shadow: 0 0 15px rgba(0, 242, 255, 0.6); font-family: 'Orbitron', sans-serif; }
        .glass-nav { background: rgba(10, 11, 16, 0.8); border-bottom: 1px solid rgba(0, 242, 255, 0.2); }
        .stats-bar { background: rgba(0, 242, 255, 0.05); border-radius: 50px; padding: 5px 20px; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="glass-nav sticky top-0 z-50 p-4 backdrop-blur-md">
        <div class="max-w-[1400px] mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-3 h-3 bg-cyan-400 rounded-full animate-pulse shadow-[0_0_10px_#00f2ff]"></div>
                <h1 class="neon-text text-xl tracking-[5px] uppercase">Keygap <span class="text-white">Advantage</span></h1>
            </div>
            <div class="stats-bar border border-cyan-500/30 hidden md:block">
                <span class="text-[11px] uppercase tracking-widest text-cyan-400 font-bold" id="clock">00:00:00</span>
            </div>
        </div>
    </nav>

    <main class="max-w-[1400px] mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-10 mt-10">
        
        <aside class="lg:col-span-3 space-y-8">
            <div class="card-3d p-6">
                <h3 class="text-cyan-400 text-xs font-black uppercase mb-4 tracking-[3px]">Market Scanner</h3>
                <div class="rounded-xl overflow-hidden border border-white/5 bg-[#131722]">
                    <iframe src="https://s.tradingview.com/embed-widget/screener/?market=crypto&theme=dark&colorTheme=dark" width="100%" height="450" frameborder="0"></iframe>
                </div>
            </div>
        </aside>

        <section class="lg:col-span-6 space-y-8">
            <div class="card-3d p-8">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-[10px] bg-cyan-500/20 text-cyan-400 px-3 py-1 rounded-full border border-cyan-500/30 uppercase font-bold">Quantum Feed v9.0</span>
                    <span class="text-[10px] text-white/40 mono uppercase">ID: 20260304233554</span>
                </div>
                <h2 class="text-3xl md:text-5xl font-bold mb-8 italic leading-none tracking-tighter uppercase">
                    "TEST DI CONNESSIONE: Il bot Keygap è operativo. Automazione Crontab verificata alle ore 18:35."
                </h2>
                <div class="rounded-2xl overflow-hidden border-2 border-cyan-500/20 shadow-[0_0_50px_rgba(0,0,0,0.8)] h-[500px]">
                    <iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&theme=dark&style=3&v=20260304233554" width="100%" height="100%" frameborder="0"></iframe>
                </div>
            </div>
        </section>

        <aside class="lg:col-span-3 space-y-8">
            <div class="card-3d p-6">
                <h3 class="text-cyan-400 text-xs font-black uppercase mb-4 tracking-[3px]">Global Events</h3>
                <div class="rounded-xl overflow-hidden border border-white/5">
                    <iframe src="https://s.tradingview.com/embed-widget/events/?colorTheme=dark&isTransparent=true&width=100%25&height=400" width="100%" height="400" frameborder="0"></iframe>
                </div>
            </div>
        </aside>

    </main>

    <footer class="mt-20 border-t border-cyan-500/10 p-16 text-center">
        <div class="neon-text text-sm mb-4">KEYGAP ADVANTAGE TERMINAL</div>
        <p class="text-[10px] text-white/20 uppercase tracking-[5px]">Proprietà di Giampiero De Luca // © 2026</p>
    </footer>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
    <script src="https://pl28819682.effectivegatecpm.com/07/47/37/074737f2d1be0f3c0e9de0585a695fd7.js"></script>
</body>
</html>
