<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEYGAP | Intelligence Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00e5ff;
            --neon-green: #00ff88;
            --bg-dark: #05070a;
            --card-bg: #0d1117;
            --border: rgba(0, 229, 255, 0.2);
        }

        body {
            background: var(--bg-dark);
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Effetto Scanline (Retro-Futuristico) */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        .dashboard {
            width: 90%;
            max-width: 1000px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 50px rgba(0, 229, 255, 0.1);
            position: relative;
            z-index: 20;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid var(--border);
            padding-bottom: 25px;
            margin-bottom: 30px;
        }

        .brand h1 {
            font-size: 2.5rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: -1px;
            color: #fff;
        }

        .brand span {
            color: var(--neon-cyan);
            font-family: 'JetBrains Mono';
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .status-badge {
            background: rgba(0, 255, 136, 0.1);
            color: var(--neon-green);
            padding: 8px 15px;
            border-radius: 5px;
            font-family: 'JetBrains Mono';
            font-size: 0.7rem;
            border: 1px solid rgba(0, 255, 136, 0.3);
            animation: pulse 2s infinite;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: rgba(0, 0, 0, 0.3);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card-label {
            font-family: 'JetBrains Mono';
            font-size: 0.7rem;
            color: var(--neon-cyan);
            margin-bottom: 10px;
            opacity: 0.8;
        }

        .card-value {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .btn-group {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 18px;
            border-radius: 10px;
            text-align: center;
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: var(--neon-cyan);
            color: #000;
        }

        .btn-primary:hover {
            background: #fff;
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .btn-secondary {
            border: 1px solid var(--border);
            color: #fff;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.05);
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header">
            <div class="brand">
                <span>Intelligence Network</span>
                <h1>KEYGAP <span>Advantage</span></h1>
            </div>
            <div class="status-badge">● SYSTEM_LIVE_CONNECTED</div>
        </div>

        <div class="grid">
            <div class="card">
                <div class="card-label">// ACCESS_POINT</div>
                <div class="card-value">Terminal Core v3.0</div>
            </div>
            <div class="card">
                <div class="card-label">// ENCRYPTION_STATUS</div>
                <div class="card-value" style="color: var(--neon-green);">SECURE</div>
            </div>
        </div>

        <div class="btn-group">
            <a href="archivio.html" class="btn btn-primary">Apri Archivio Report</a>
            <a href="https://github.com/" class="btn btn-secondary">Source Code</a>
        </div>

        <div style="margin-top: 30px; text-align: center;">
            <p style="font-family: 'JetBrains Mono'; font-size: 0.6rem; color: rgba(255,255,255,0.3);">
                WARNING: AUTHORIZED ACCESS ONLY. ALL DATA IS ENCRYPTED VIA KEYGAP PROTOCOL.
            </p>
        </div>
    </div>

</body>
</html>
