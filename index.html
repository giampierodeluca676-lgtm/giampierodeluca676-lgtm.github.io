<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>KEYGAP | TITAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #010204; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; min-height: 100vh; display: flex; flex-direction: column; }
        .neon-text { color: var(--neon); text-shadow: 0 0 15px rgba(0, 242, 255, 0.7); font-family: 'Orbitron'; }
        
        /* HEADER GIGANTE ORIGINALE */
        header { padding: 15px; border-bottom: 2px solid var(--neon); background: rgba(0,0,0,0.8); }
        
        .main-container { flex: 1; display: flex; flex-direction: column; padding: 15px; gap: 20px; }
        
        /* BOX GRAFICO MODERNO */
        .chart-box { 
            height: 400px; 
            border: 2px solid var(--neon); 
            border-radius: 8px; 
            overflow: hidden; 
            background: #000; 
            flex-shrink: 0;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }
        
        /* CARD DATI ORIGINALE */
        .side-card { 
            background: rgba(10, 15, 25, 0.98); 
            border: 2px solid var(--neon); 
            border-radius: 12px; 
            padding: 25px; 
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3); 
        }

        .btn-glow { 
            background: rgba(0, 242, 255, 0.1); 
            border: 2px solid var(--neon); 
            color: var(--neon); 
            font-family: 'Orbitron'; 
            text-transform: uppercase; 
            font-size: 14px; 
            padding: 18px; 
            transition: 0.3s; 
            font-weight: 900;
        }
        .btn-glow:hover { background: var(--neon); color: #000; box-shadow: 0 0 25px var(--neon); }

        .status-row { 
            border-bottom: 1px solid rgba(0, 242, 255, 0.2); 
            padding: 15px 0; 
            display: flex; 
            justify-content: space-between; 
            font-family: 'Orbitron'; 
            font-size: 15px; 
        }

        @media (min-width: 1024px) {
            .main-container { flex-direction: row; padding: 30px; }
            .chart-box { flex: 3; height: 75vh; }
            .side-card { flex: 1; }
        }
    </style>
</head>
<body>
    <header class="flex flex-col gap-4">
        <div class="neon-text text-6xl font-black italic tracking-tighter">KEYGAP</div>
        <div class="flex justify-between items-center border-t border-white/10 pt-4">
            <div id="date" class="text-4xl font-bold text-white uppercase">--/--/----</div>
            <div id="clock" class="neon-text text-5xl font-bold">00:00:00</div>
        </div>
    </header>

    <div class="main-container">
        <div class="chart-box">
            <div id="tradingview_main" style="width: 100%; height: 100%;"></div>
        </div>

        <div class="side-card">
            <div class="mb-8">
                <div class="neon-text text-[12px] mb-6 tracking-[6px] font-bold">SYSTEM_REPORT_V3</div>
                <div class="status-row"><span>STATUS</span><span id="m-status" class="text-green-400 font-black">--</span></div>
                <div class="status-row"><span>PRICE</span><span id="m-price" class="font-black text-white">--</span></div>
                <div class="status-row"><span>SIGNAL</span><span id="m-signal" class="font-black text-white">--</span></div>
                <div class="status-row"><span>RELIABILITY</span><span id="m-reliability" class="font-black text-white">--</span></div>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-8">
                <button onclick="switchSymbol('BITSTAMP:BTCUSD')" class="btn-glow text-center">BITCOIN</button>
                <button onclick="switchSymbol('TVC:GOLD')" class="btn-glow text-center">GOLD</button>
            </div>
            
            <button onclick="window.location.href='editoriale.html'" class="btn-glow w-full text-2xl py-8 font-black shadow-lg">NEWS TERMINAL ►</button>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        async function loadData() {
            try {
                const r = await fetch('./market_status.json?v=' + Date.now());
                if (!r.ok) return;
                const d = await r.json();
                document.getElementById('m-status').textContent = d.status || "WAITING";
                document.getElementById('m-price').textContent = d.price || "---";
                document.getElementById('m-signal').textContent = d.signal || "---";
                document.getElementById('m-reliability').textContent = d.reliability || "---";
            } catch (e) { }
        }

        function initChart(s = 'BITSTAMP:BTCUSD') {
            new TradingView.widget({
                "autosize": true,
                "symbol": s,
                "interval": "D",
                "timezone": "Europe/Rome",
                "theme": "dark",
                "style": "1",
                "locale": "it",
                "toolbar_bg": "#000000",
                "enable_publishing": false,
                "hide_side_toolbar": false, // Sbloccata per analisi pro
                "allow_symbol_change": true,
                "container_id": "tradingview_main",
                "overrides": {
                    "mainSeriesProperties.candleStyle.upColor": "#00f2ff",
                    "mainSeriesProperties.candleStyle.downColor": "#ff0055",
                    "paneProperties.background": "#010204"
                }
            });
        }

        function switchSymbol(s) { initChart(s); }
        
        function updateTime() {
            const n = new Date();
            document.getElementById('clock').textContent = n.toLocaleTimeString('it-IT');
            document.getElementById('date').textContent = n.toLocaleDateString('it-IT');
        }

        setInterval(updateTime, 1000); 
        setInterval(loadData, 5000);
        updateTime(); initChart(); loadData();
    </script>
</body>
</html>
