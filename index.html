<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEYGAP | TITAN TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #010204; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; min-height: 100vh; overflow-x: hidden; }
        .neon-border { border: 1px solid var(--neon); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2), inset 0 0 10px rgba(0, 242, 255, 0.1); }
        .card-rilievo { background: rgba(10, 15, 25, 0.9); border: 2px solid var(--neon); box-shadow: 8px 8px 0px rgba(0, 242, 255, 0.2); transition: all 0.3s; }
        .neon-text { color: var(--neon); text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); font-family: 'Orbitron', sans-serif; }
        
        /* Fix Grafico: altezza minima garantita */
        .chart-container { min-height: 500px; height: 60vh; width: 100%; position: relative; }
        
        @media (min-width: 1024px) {
            .main-layout { display: grid; grid-template-columns: 1fr 400px; gap: 30px; padding: 40px; }
            .chart-container { height: 75vh; }
        }
    </style>
</head>
<body>
    <div class="main-layout p-4 flex flex-col gap-6">
        <div class="flex justify-between items-center col-span-2 border-b border-white/10 pb-4">
            <div><p class="neon-text text-[10px] tracking-widest">SYSTEM_READY</p><p id="date" class="text-xl font-bold">--/--/----</p></div>
            <div class="text-right"><p class="neon-text text-[10px] tracking-widest">LOCAL_TIME</p><p id="clock" class="text-xl font-bold">00:00:00</p></div>
        </div>

        <div class="chart-container neon-border rounded-lg overflow-hidden bg-black">
            <div id="tradingview_chart" class="h-full w-full"></div>
        </div>

        <div class="side-panel flex flex-col gap-6">
            <div class="card-rilievo p-6 rounded-lg">
                <h1 class="neon-text text-3xl mb-6 italic">KEYGAP_</h1>
                
                <div class="bg-black/50 p-4 rounded border border-white/10 mb-6">
                    <p class="neon-text text-[11px] mb-4 border-b border-neon/30 pb-1">MARKET_STATUS</p>
                    <div class="space-y-3 font-mono text-sm">
                        <div class="flex justify-between border-b border-white/5 pb-1">
                            <span class="opacity-60">STATUS:</span>
                            <span id="m-status" class="font-bold text-yellow-400 font-['Orbitron']">SYNCING...</span>
                        </div>
                        <div class="flex justify-between border-b border-white/5 pb-1">
                            <span class="opacity-60">BTC_PRICE:</span>
                            <span id="m-price" class="font-bold font-['Orbitron']">---</span>
                        </div>
                        <div class="flex justify-between border-b border-white/5 pb-1">
                            <span class="opacity-60">SIGNAL:</span>
                            <span id="m-signal" class="font-bold font-['Orbitron']">---</span>
                        </div>
                        <div class="flex justify-between border-b border-white/5 pb-1">
                            <span class="opacity-60">ACCURACY:</span>
                            <span id="m-reliability" class="font-bold font-['Orbitron']">---</span>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2 mb-6">
                    <button onclick="switchSymbol('BITSTAMP:BTCUSD')" class="border border-neon/50 p-2 text-[10px] font-bold hover:bg-neon hover:text-black transition">BITCOIN</button>
                    <button onclick="switchSymbol('TVC:GOLD')" class="border border-neon/50 p-2 text-[10px] font-bold hover:bg-neon hover:text-black transition">GOLD</button>
                </div>

                <button onclick="window.location.href='editoriale.html'" class="w-full bg-neon text-black p-4 font-black uppercase tracking-tighter hover:bg-white transition">Terminal News Access</button>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // CARICAMENTO DATI BLINDATO
        async function loadData() {
            try {
                // Forziamo il caricamento dal file market_status.json nella stessa cartella
                const res = await fetch('./market_status.json?t=' + Date.now());
                if (!res.ok) throw new Error();
                const d = await res.json();
                
                document.getElementById('m-status').textContent = d.status || "N/A";
                document.getElementById('m-price').textContent = d.price || "---";
                document.getElementById('m-signal').textContent = d.signal || "---";
                document.getElementById('m-reliability').textContent = d.reliability || "---";
                
                // Colore dinamico
                const s = document.getElementById('m-status');
                s.style.color = d.status === "OPERATIVO" ? "#4ade80" : "#f87171";
            } catch (e) {
                console.log("In attesa di dati...");
            }
        }

        function initChart(symbol = 'BITSTAMP:BTCUSD') {
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": "D",
                "theme": "dark",
                "style": "1",
                "locale": "it",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_side_toolbar": true,
                "allow_symbol_change": true,
                "container_id": "tradingview_chart"
            });
        }

        function switchSymbol(s) { initChart(s); }
        function updateTime() {
            const n = new Date();
            document.getElementById('clock').textContent = n.toLocaleTimeString('it-IT');
            document.getElementById('date').textContent = n.toLocaleDateString('it-IT');
        }

        setInterval(updateTime, 1000);
        setInterval(loadData, 10000);
        updateTime();
        initChart();
        loadData();
    </script>
</body>
</html>
