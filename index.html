
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEYGAP | IMMERSIVE TRADING</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #020305; }
        body { 
            background: var(--bg); color: #e0e6ed; font-family: 'Rajdhani', sans-serif;
            margin: 0; overflow-x: hidden;
        }
        
        .hero-gradient {
            background: radial-gradient(circle at 50% -20%, rgba(0, 242, 255, 0.15) 0%, transparent 70%);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
        }

        .neon-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 242, 255, 0.2);
            padding: 12px 25px;
            border-radius: 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            letter-spacing: 2px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .neon-btn:hover {
            background: var(--neon); color: #000;
            box-shadow: 0 0 30px var(--neon);
            transform: translateY(-5px);
        }

        .main-title {
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            line-height: 0.9;
            background: linear-gradient(to bottom, #fff 40%, rgba(255,255,255,0.4));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="hero-gradient min-h-screen">

    <nav class="p-8 flex justify-between items-center max-w-[1600px] mx-auto">
        <div class="flex flex-col">
            <span class="font-black text-2xl tracking-[10px] uppercase text-white">Keygap</span>
            <span class="text-[8px] tracking-[4px] text-cyan-400 font-bold uppercase">Quantum Advantage</span>
        </div>
        <div id="clock" class="text-2xl font-bold tracking-widest text-white/50 mono">00:00:00</div>
    </nav>

    <main class="max-w-[1600px] mx-auto px-6 py-12">
        
        <div class="text-center mb-16">
            <span class="inline-block px-4 py-1 rounded-full border border-cyan-500/30 text-cyan-400 text-[10px] uppercase tracking-[4px] font-bold mb-6">Live Intelligence Report</span>
            <h2 class="main-title italic mb-10">
                "TEST DI CONNESSIONE: Il bot Keygap è operativo. Automazione Crontab verificata alle ore 18:35."
            </h2>
            
            <div class="flex flex-wrap justify-center gap-4 mb-12">
                <button onclick="change('BINANCE:BTCUSDT')" class="neon-btn">BITCOIN</button>
                <button onclick="change('TVC:GOLD')" class="neon-btn">GOLD</button>
                <button onclick="change('INDEX:SPX')" class="neon-btn">S&P 500</button>
                <button onclick="change('FX:EURUSD')" class="neon-btn">EUR / USD</button>
                <button onclick="change('BINANCE:ETHUSDT')" class="neon-btn">ETHEREUM</button>
            </div>
        </div>

        <div class="glass-panel p-2 md:p-4 mb-16 h-[750px] relative">
            <div class="absolute inset-0 bg-gradient-to-b from-cyan-500/5 to-transparent rounded-[40px] pointer-events-none"></div>
            <iframe id="mainChart" src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&theme=dark&style=3" width="100%" height="100%" frameborder="0"></iframe>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="glass-panel p-8">
                <h4 class="font-bold text-cyan-400 text-[11px] uppercase tracking-widest mb-4">Market Sentiment</h4>
                <iframe src="https://s.tradingview.com/embed-widget/technical-analysis/?symbol=BINANCE:BTCUSDT&theme=dark" width="100%" height="320" frameborder="0"></iframe>
            </div>
            <div class="glass-panel p-8">
                <h4 class="font-bold text-cyan-400 text-[11px] uppercase tracking-widest mb-4">Economic Pulse</h4>
                <iframe src="https://s.tradingview.com/embed-widget/events/?colorTheme=dark&isTransparent=true" width="100%" height="320" frameborder="0"></iframe>
            </div>
            <div class="glass-panel p-8">
                <h4 class="font-bold text-cyan-400 text-[11px] uppercase tracking-widest mb-4">Crypto Heatmap</h4>
                <iframe src="https://s.tradingview.com/embed-widget/crypto-mcap/?locale=it&theme=dark" width="100%" height="320" frameborder="0"></iframe>
            </div>
        </div>

    </main>

    <footer class="py-20 text-center opacity-20">
        <div class="text-[10px] tracking-[15px] uppercase">Keygap Advantage // 20260304235414</div>
    </footer>

    <script>
        function updateClock() {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('it-IT', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        function change(s) {
            const f = document.getElementById('mainChart');
            f.style.opacity = '0.3';
            f.src = `https://s.tradingview.com/widgetembed/?symbol=${s}&theme=dark&style=3&v=${Date.now()}`;
            setTimeout(() => f.style.opacity = '1', 500);
        }
    </script>
    <script src="https://pl28819682.effectivegatecpm.com/07/47/37/074737f2d1be0f3c0e9de0585a695fd7.js"></script>
</body>
</html>
