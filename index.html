<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keygap Advantage | Professional Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .ticker-wrap { background: #000; color: #3b82f6; padding: 10px 0; overflow: hidden; border-bottom: 1px solid #1e40af; z-index: 100; position: sticky; top: 0; }
        .ticker-move { display: inline-block; white-space: nowrap; animation: scroll 40s linear infinite; font-family: monospace; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(59, 130, 246, 0.2); }
        
        /* Drawer a scomparsa per le News */
        #news-drawer { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 500; }
        .drawer-closed { transform: translateX(100%); }
        .drawer-open { transform: translateX(0); }

        /* Overlay a scomparsa per Intelligence */
        #intelligence-overlay { transition: opacity 0.5s ease-in-out; z-index: 600; }
    </style>
</head>
<body class="bg-[#020617] text-gray-200 font-sans overflow-x-hidden">

    <div class="ticker-wrap">
        <div class="ticker-move">CARICAMENTO FLUSSI DATI KEYGAP ADVANTAGE... BTC/USDT IN ATTESA... SENTIMENT DI MERCATO...</div>
    </div>

    <main class="p-4 lg:p-6 max-w-[1800px] mx-auto flex flex-col lg:flex-row gap-6 min-h-screen">
        <div class="w-full lg:w-72 flex flex-col gap-4">
            <div class="glass p-5 rounded-2xl border-b-2 border-blue-500 shadow-lg">
                <h3 class="text-[10px] font-bold text-gray-400 uppercase mb-4 tracking-widest">Market Data</h3>
                <div class="space-y-4">
                    <div class="bg-black/40 p-3 rounded-xl border border-white/5 text-center">
                        <span class="text-[10px] text-gray-500 block uppercase">Prezzo BTC</span>
                        <div id="price" class="text-xl font-black text-white">---</div>
                    </div>
                    <div class="bg-black/40 p-3 rounded-xl border border-white/5 text-center">
                        <span class="text-[10px] text-gray-500 block uppercase">Segnale</span>
                        <div id="signal" class="text-xl font-black text-blue-400">---</div>
                    </div>
                </div>
            </div>

            <div class="glass p-5 rounded-2xl border-l-4 border-red-600">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-[10px] font-bold text-red-500 animate-pulse">● TG LIVE</span>
                </div>
                <div id="tg-headline" class="text-lg font-bold text-white italic min-h-[60px]">Sincronizzazione...</div>
                <div class="w-full bg-gray-800 h-1.5 rounded-full mt-4 overflow-hidden">
                    <div id="tg-progress" class="bg-red-600 h-full w-0"></div>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col gap-4">
            <header class="flex flex-col md:flex-row justify-between items-center border-b border-gray-800 pb-4">
                <h1 class="text-3xl font-black italic text-white">KEYGAP <span class="text-blue-500">ADVANTAGE</span></h1>
                <div class="flex items-center gap-3">
                    <button onclick="toggleIntelligence()" class="bg-red-600 px-4 py-2 rounded-lg font-bold text-xs hover:bg-red-700 transition-all">📊 INTELLIGENCE</button>
                    <button onclick="toggleNews()" class="bg-blue-600 px-4 py-2 rounded-lg font-bold text-xs hover:bg-blue-700 transition-all">📰 NOTIZIE LIVE</button>
                    <div id="live-clock" class="bg-black/60 border border-gray-800 px-3 py-2 rounded-lg font-mono text-blue-400 text-xs">00:00:00</div>
                </div>
            </header>
            <div class="flex-1 glass rounded-3xl overflow-hidden min-h-[500px]">
                <div id="main-chart" class="w-full h-full"></div>
            </div>
        </div>
    </main>

    <div id="news-drawer" class="fixed top-0 right-0 h-full w-full md:w-[400px] glass border-l border-gray-800 drawer-closed flex flex-col">
        <div class="p-6 border-b border-gray-800 flex justify-between items-center bg-black/40">
            <h2 class="font-black text-xl italic text-white uppercase">Notizie Live</h2>
            <button onclick="toggleNews()" class="text-white text-3xl">&times;</button>
        </div>
        <div id="news-container" class="flex-1 overflow-y-auto p-4 space-y-4 text-sm text-gray-300">
            </div>
    </div>

    <div id="intelligence-overlay" class="fixed inset-0 bg-black/95 hidden opacity-0 flex flex-col">
        <div class="p-6 border-b border-gray-800 flex justify-between items-center">
            <h2 class="text-2xl font-black italic text-red-600">KEYGAP INTELLIGENCE</h2>
            <button onclick="toggleIntelligence()" class="text-white text-5xl font-light">&times;</button>
        </div>
        <div id="reports-display-area" class="flex-1 overflow-y-auto p-6 md:p-12">
            </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Funzioni per i tasti a scomparsa
        function toggleNews() {
            const d = document.getElementById('news-drawer');
            d.classList.toggle('drawer-closed'); d.classList.toggle('drawer-open');
        }

        async function toggleIntelligence() {
            const o = document.getElementById('intelligence-overlay');
            if (o.classList.contains('hidden')) {
                o.classList.remove('hidden');
                setTimeout(() => o.classList.add('opacity-100'), 10);
                await loadIntelligenceReports();
            } else {
                o.classList.remove('opacity-100');
                setTimeout(() => o.classList.add('hidden'), 500);
            }
        }

        async function loadIntelligenceReports() {
            const area = document.getElementById('reports-display-area');
            area.innerHTML = '<div class="text-center text-red-500 font-mono animate-pulse">CRYPTING...</div>';
            try {
                const response = await fetch('latest_report.html?v=' + Date.now());
                area.innerHTML = response.ok ? await response.text() : 'Nessun report disponibile.';
            } catch (e) { area.innerHTML = 'Errore nodo.'; }
        }

        setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('it-IT'); }, 1000);
        new TradingView.widget({ "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "D", "theme": "dark", "container_id": "main-chart" });

        let newsIndex = 0;
        async function sync() {
            try {
                const r = await fetch('market_status.json?v=' + Date.now());
                const d = await r.json();
                document.getElementById('price').innerText = d.price || '---';
                document.getElementById('signal').innerText = d.signal || '---';
                
                if (d.news && d.news.length > 0) {
                    // Riempie il cassetto Notizie Live (Drawer)
                    const nc = document.getElementById('news-container');
                    nc.innerHTML = d.news.map(n => `<div class="p-3 border-b border-gray-800"><b class="text-blue-500">${n.time}</b>: ${n.text}</div>`).join('');
                    
                    // Mostra la notizia corrente nel TG laterale
                    document.getElementById('tg-headline').innerText = d.news[newsIndex].text;
                    const prog = document.getElementById('tg-progress');
                    prog.style.transition = 'none'; prog.style.width = '0%';
                    setTimeout(() => { prog.style.transition = 'width 11800ms linear'; prog.style.width = '100%'; }, 100);
                    newsIndex = (newsIndex + 1) % d.news.length;
                }
            } catch(e) {}
        }
        setInterval(sync, 12000); sync();
    </script>
</body>
</html>
