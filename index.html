<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KEYGAP | TITAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #010204; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .neon-text { color: var(--neon); text-shadow: 0 0 15px rgba(0, 242, 255, 0.8); font-family: 'Orbitron'; }
        
        header { padding: 10px 20px; border-bottom: 2px solid var(--neon); background: #000; flex-shrink: 0; }
        .titan-time { font-size: clamp(1.8rem, 6vw, 4rem); font-weight: 900; line-height: 1; text-transform: uppercase; }

        .main-layout { flex: 1; display: flex; flex-direction: column; min-height: 0; }
        @media (min-width: 1024px) { .main-layout { flex-direction: row; } }

        .chart-container { height: 45vh; background: #000; position: relative; border-bottom: 2px solid var(--neon); flex-shrink: 0; }
        @media (min-width: 1024px) { .chart-container { height: 100%; flex: 2.8; border-bottom: none; border-right: 2px solid var(--neon); } }

        .sidebar { flex: 1; background: #05070a; padding: 15px; display: flex; flex-direction: column; justify-content: space-between; overflow-y: auto; }
        @media (min-width: 1024px) { .sidebar { flex: 1.2; padding: 40px; } }

        /* DATA BLOCK ENHANCEMENT */
        .status-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,242,255,0.1); padding: 12px 0; font-family: 'Orbitron'; }
        .status-label { font-size: 12px; color: rgba(0,242,255,0.6); tracking: 2px; }
        .status-value { font-size: 16px; font-weight: 900; }

        @media (min-width: 1024px) {
            .status-row { padding: 35px 0; border-bottom-width: 2px; }
            .status-label { font-size: 24px; tracking: 6px; }
            .status-value { font-size: 45px; }
        }

        .btn-titan { background: transparent; border: 2px solid var(--neon); color: var(--neon); font-family: 'Orbitron'; font-weight: 900; padding: 14px; cursor: pointer; text-transform: uppercase; width: 100%; font-size: 12px; margin-bottom: 8px; transition: 0.2s; }
        @media (min-width: 1024px) { .btn-titan { font-size: 22px; padding: 30px; margin-bottom: 20px; border-width: 3px; } }
        
        .btn-main { border-color: #fff; color: #fff; font-size: 16px; }
        @media (min-width: 1024px) { .btn-main { font-size: 32px; padding: 45px; } }
    </style>
</head>
<body>
    <header class="flex flex-col md:flex-row justify-between items-center text-center">
        <div class="neon-text text-4xl md:text-6xl italic tracking-tighter">KEYGAP</div>
        <div class="flex gap-4 md:gap-10">
            <div id="date" class="titan-time text-white opacity-90">--/--/--</div>
            <div id="clock" class="titan-time neon-text">00:00:00</div>
        </div>
    </header>

    <div class="main-layout">
        <div class="chart-container" id="CHART_ZONE">
            <div id="TV_ELITE" style="width:100%;height:100%;"></div>
        </div>

        <div class="sidebar">
            <div class="status-panel">
                <div class="status-row">
                    <span class="status-label">STATUS</span>
                    <span id="m-status" class="status-value text-green-400 drop-shadow-[0_0_10px_rgba(74,222,128,0.5)]">OPERATIVO</span>
                </div>
                <div class="status-row">
                    <span class="status-label">PRICE</span>
                    <span id="m-price" class="status-value text-white">---</span>
                </div>
                <div class="status-row">
                    <span class="status-label">SIGNAL</span>
                    <span id="m-signal" class="status-value neon-text">---</span>
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <button onclick="window.location.href='editoriale.html'" class="btn-titan btn-main">NEWS TERMINAL ►</button>
                <div class="grid grid-cols-2 gap-2 lg:gap-5">
                    <button onclick="loadChart('BITSTAMP:BTCUSD')" class="btn-titan">BTC</button>
                    <button onclick="loadChart('TVC:GOLD')" class="btn-titan">GOLD</button>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        function loadChart(s) {
            document.getElementById('TV_ELITE').innerHTML = '';
            new TradingView.widget({
                "autosize": true, "symbol": s, "interval": "D", "timezone": "Europe/Rome",
                "theme": "dark", "style": "3", "locale": "it", "container_id": "TV_ELITE",
                "hide_side_toolbar": false, "allow_symbol_change": true, "backgroundColor": "#010204",
                "overrides": { 
                    "mainSeriesProperties.priceAxisProperties.autoScale": true
                }
            });
        }
        async function sync() {
            try {
                const r = await fetch('./market_status.json?v=' + Date.now());
                const d = await r.json();
                if(d.status) document.getElementById('m-status').textContent = d.status.toUpperCase();
                if(d.price) document.getElementById('m-price').textContent = d.price;
                if(d.signal) document.getElementById('m-signal').textContent = d.signal.toUpperCase();
            } catch (e) {}
        }
        function update() {
            const n = new Date();
            document.getElementById('clock').textContent = n.toLocaleTimeString('it-IT');
            document.getElementById('date').textContent = n.toLocaleDateString('it-IT');
        }
        setInterval(update, 1000); setInterval(sync, 5000);
        update(); sync(); setTimeout(() => { loadChart('BITSTAMP:BTCUSD'); }, 500);
    </script>
</body>
</html>
