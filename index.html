<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KEYGAP | TITAN TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #010204; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Rajdhani', sans-serif; 
            margin: 0; 
            min-height: 100vh; 
            overflow-y: auto !important; /* */
            overflow-x: hidden; 
        }

        .neon-text { color: var(--neon); text-shadow: 0 0 15px rgba(0, 242, 255, 0.7); font-family: 'Orbitron', sans-serif; }
        
        .terminal-grid { 
            display: flex; 
            flex-direction: column; 
            padding: 15px; 
            gap: 20px; 
            width: 100%;
        }

        .main-title { 
            font-size: clamp(1.8rem, 8vw, 3.5rem); 
            font-weight: 900; 
            text-transform: uppercase; 
            text-align: center; 
            line-height: 1.1; 
        }
        .main-title span { color: var(--neon); }

        .btn-asset { 
            background: rgba(0, 242, 255, 0.05); 
            border: 1px solid rgba(0, 242, 255, 0.4); 
            padding: 12px; 
            font-family: 'Orbitron'; 
            font-size: 11px;
            flex: 1 1 45%; 
        }
        
        /* FIX DEFINITIVO: Altezza minima garantita per il frame */
        .chart-frame { 
            background: #000; 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 4px; 
            position: relative; 
            height: 700px !important; 
            width: 100% !important;
            margin-bottom: 30px;
        }

        /* Forza il div interno del grafico */
        #tradingview_chart {
            height: 650px !important; 
            width: 100% !important;
        }

        @media (min-width: 1024px) {
            .terminal-grid { display: grid; grid-template-rows: auto auto 1fr auto; height: 100vh; padding: 25px 50px; }
            .chart-frame { height: auto !important; margin-bottom: 0; }
            #tradingview_chart { height: 100% !important; }
            body { overflow: hidden !important; }
        }
    </style>
</head>
<body>
    <div class="terminal-grid">
        <header class="flex justify-between items-center opacity-70">
            <div><div class="neon-text text-[8px] tracking-[4px]">DATE</div><div id="date" class="text-xl">--/--/----</div></div>
            <div class="text-right"><div class="neon-text text-[8px] tracking-[4px]">TIME</div><div id="clock" class="text-xl">00:00:00</div></div>
        </header>

        <div class="flex flex-col items-center gap-6">
            <h1 class="main-title"><span>Keygap</span> Advantage</h1>
            <div class="flex flex-wrap justify-center gap-3 w-full">
                <button onclick="switchSymbol('BITSTAMP:BTCUSD')" class="btn-asset">BITCOIN</button>
                <button onclick="switchSymbol('TVC:GOLD')" class="btn-asset">GOLD</button>
                <button onclick="switchSymbol('SP:SPX')" class="btn-asset">S&P 500</button>
                <button onclick="switchSymbol('FX:EURUSD')" class="btn-asset">EUR/USD</button>
            </div>
            <button onclick="startTransition()" class="border-2 border-[#00f2ff] p-3 w-full font-bold tracking-[5px] bg-[#00f2ff]/10">🚀 TERMINALE NOTIZIE</button>
        </div>

        <div class="chart-frame">
            <div class="panel-header flex justify-between items-center p-3 border-b border-white/10 bg-[#0d1117]">
                <span id="chart-title" class="neon-text text-[10px] tracking-[4px]">PRIMARY DATASTREAM // BTCUSD</span>
            </div>
            <div id="tradingview_chart"></div>
        </div>
        
        <footer class="text-center opacity-20 pb-10">
            <div class="neon-text text-[10px] tracking-[20px]">Keygap Titan</div>
        </footer>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        function initChart(symbol = 'BITSTAMP:BTCUSD') {
            // Rimosso "autosize" e impostate altezze fisse per forzare il mobile
            new TradingView.widget({ 
                "width": "100%", 
                "height": window.innerWidth < 1024 ? 650 : "100%", 
                "symbol": symbol, 
                "interval": "D", 
                "theme": "dark", 
                "style": "1", 
                "locale": "it", 
                "container_id": "tradingview_chart",
                "hide_side_toolbar": true,
                "allow_symbol_change": false
            });
        }
        function switchSymbol(symbol) { 
            document.getElementById('chart-title').textContent = 'PRIMARY DATASTREAM // ' + symbol.split(':')[1]; 
            initChart(symbol); 
        }
        function startTransition() { window.location.href = "editoriale.html"; }
        function updateDateTime() { 
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT');
            document.getElementById('date').textContent = now.toLocaleDateString('it-IT');
        }
        setInterval(updateDateTime, 1000); 
        updateDateTime(); 
        initChart();
    </script>
</body>
</html>
