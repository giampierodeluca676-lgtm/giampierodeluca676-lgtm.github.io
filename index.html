
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>KEYGAP MASTER V52</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #05070a; color: #e6edf3; font-family: sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        .grid-layout { display: grid; grid-template-columns: 1fr 350px; height: calc(100vh - 50px); gap: 10px; padding: 10px; }
        header { height: 50px; background: #0d1117; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #30363d; justify-content: space-between; }
        .card { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        .card-header { background: #161b22; padding: 10px; font-size: 11px; font-weight: bold; color: #58a6ff; text-transform: uppercase; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <header>
        <div style="font-weight: 900; font-size: 20px;">KEYGAP <span style="color:#58a6ff">MASTER</span></div>
        <div id="clock" style="font-family: monospace; color: #58a6ff; font-weight: bold;">00:00:00</div>
    </header>
    <div class="grid-layout">
        <div class="card">
            <div class="card-header">S&P 500 LIVE CHART</div>
            <iframe src="https://s.tradingview.com/widgetembed/?symbol=SPX&interval=5&theme=dark"></iframe>
        </div>
        <div style="display: grid; grid-template-rows: 1fr 1fr; gap: 10px;">
            <div class="card">
                <div class="card-header">MARKET NEWS</div>
                <iframe src="https://s.tradingview.com/embed-widget/timeline/?locale=it&theme=dark"></iframe>
            </div>
            <div class="card">
                <div class="card-header">TECHNICAL GAUGE</div>
                <iframe src="https://s.tradingview.com/embed-widget/technical-analysis/?symbol=SPX&theme=dark"></iframe>
            </div>
        </div>
    </div>
    <script>
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('it-IT'); }, 1000);
    </script>
</body>
</html>
