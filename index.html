<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEYGAP | QUANTUM TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #010204; --panel-bg: rgba(10, 11, 13, 0.8); }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Rajdhani', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
            perspective: 2000px; /* Abilita la prospettiva 3D globale */
        }

        .neon-text { color: var(--neon); text-shadow: 0 0 15px rgba(0, 242, 255, 0.7); font-family: 'Orbitron', sans-serif; }
        
        /* --- TITOLO PRINCIPALE 3D --- */
        .main-title-container {
            transform: translateZ(50px) rotateX(5deg);
            margin: 30px 0 50px 0;
            text-align: center;
        }
        .main-title { 
            font-size: clamp(2rem, 5vw, 4rem); 
            font-weight: 900; 
            color: #fff; 
            line-height: 1; 
            font-style: italic; 
            text-transform: uppercase;
            letter-spacing: -2px;
            position: relative;
        }
        .main-title span.key { color: var(--neon); text-shadow: 0 0 30px rgba(0, 242, 255, 0.5); }
        .main-title::after {
            content: "AD-VANTAGE";
            position: absolute;
            bottom: -25px; left: 50%;
            transform: translateX(-50%);
            font-size: 10px; font-weight: 300; font-family: 'Orbitron', sans-serif;
            letter-spacing: 15px; color: rgba(255,255,255,0.3);
        }

        /* --- NAVIGAZIONE 3D --- */
        .nav-3d-container { transform-style: preserve-3d; }
        
        .btn-asset-3d {
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            border: 1px solid rgba(0, 242, 255, 0.3);
            padding: 12px 28px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 2px;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            transform: translateZ(20px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .btn-asset-3d:hover {
            background: var(--neon);
            color: #000;
            border-color: var(--neon);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.5);
            transform: translateZ(40px) translateY(-5px);
        }

        .btn-terminal-3d {
            background: rgba(0, 242, 255, 0.1);
            color: var(--neon);
            border: 2px solid var(--neon);
            padding: 16px 50px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 8px;
            transition: all 0.5s ease;
            transform: translateZ(10px) rotateX(-10deg);
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.1);
        }
        .btn-terminal-3d:hover {
            background: var(--neon);
            color: #000;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.6);
            transform: translateZ(60px) rotateX(0deg);
        }

        /* --- PANNELLI DATI 3D --- */
        .quant-panel-3d {
            background: var(--panel-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            transform-style: preserve-3d;
            transition: transform 0.6s ease, box-shadow 0.6s ease;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        .quant-panel-3d:hover {
            transform: translateZ(10px) rotateY(1deg);
            box-shadow: 0 30px 70px rgba(0,0,0,1);
            border-color: rgba(0, 242, 255, 0.1);
        }
        
        .panel-header-3d {
            background: rgba(22, 27, 34, 0.6);
            padding: 10px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transform: translateZ(5px);
        }

        /* --- CONTENUTI --- */
        .chart-container { height: 650px; width: 100%; transform: translateZ(1px); }
        .heatmap-container { height: 450px; width: 100%; transform: translateZ(1px); }

        /* Effetto di Dissolvenza Pagina */
        .page-exit { opacity: 0; filter: blur(30px); transform: scale(1.15) rotateX(20deg); transition: all 1s ease; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-[1700px] mx-auto">
        <header class="flex justify-between items-center mb-8 pb-4 border-b border-white/5 opacity-70">
            <div>
                <div class="neon-text text-[10px] tracking-[8px] mb-1">SYSTEM://OPERATIONAL</div>
                <div id="clock" class="text-2xl font-light tracking-tighter text-white/50">00:00:00</div>
            </div>
            <div class="text-right">
                <div class="neon-text text-[10px] tracking-[6px]">QUANTUM_TERMINAL</div>
                <div class="text-[9px] text-white/20 uppercase font-medium">High-Frequency Intelligence v3.0</div>
            </div>
        </header>

        <div class="main-title-container">
            <h1 class="main-title"><span class="key">Keygap</span> Advantage</h1>
        </div>

        <div class="nav-3d-container flex flex-col items-center gap-6 mb-16">
            <div class="flex flex-wrap justify-center gap-5">
                <button onclick="switchSymbol('BITSTAMP:BTCUSD')" class="btn-asset-3d">Bitcoin</button>
                <button onclick="switchSymbol('TVC:GOLD')" class="btn-asset-3d">Gold</button>
                <button onclick="switchSymbol('SP:SPX')" class="btn-asset-3d">S&P 500</button>
                <button onclick="switchSymbol('FX:EURUSD')" class="btn-asset-3d">EUR / USD</button>
            </div>
            <button onclick="startTransition()" class="btn-terminal-3d">
                > TERMINALE NOTIZIE
            </button>
        </div>

        <div class="quant-panel-3d mb-10">
            <div class="panel-header-3d flex justify-between items-center">
                <span id="chart-title" class="neon-text text-[11px] tracking-[6px]">MARKET ANALYTICS // BTCUSD</span>
                <span class="text-[9px] text-white/30 uppercase">LIVE DATA FEED</span>
            </div>
            <div id="tradingview_chart" class="chart-container"></div>
        </div>

        <div class="quant-panel-3d mb-24">
            <div class="panel-header-3d"><span class="neon-text text-[11px] tracking-[6px]">Global Asset Distribution Heatmap</span></div>
            <div class="heatmap-container">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-crypto-coins-heatmap.js" async>
                { "symbolGroups": [ { "name": "Market Leaders", "symbols": [ { "name": "BINANCE:BTCUSDT" }, { "name": "BINANCE:ETHUSDT" }, { "name": "BINANCE:SOLUSDT" }, { "name": "BINANCE:BNBUSDT" }, { "name": "BINANCE:XRPUSDT" } ] } ], "colorTheme": "dark", "isTransparent": true, "hasSymbolTooltip": true, "locale": "it", "displayMode": "regular", "width": "100%", "height": "100%" }
                </script>
            </div>
        </div>
    </div>

    <footer class="text-center py-20 border-t border-white/5 opacity-10"><div class="neon-text text-[10px] tracking-[30px]">Keygap Terminal</div></footer>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let widget;
        function initChart(symbol = 'BITSTAMP:BTCUSD') {
            widget = new TradingView.widget({
                "width": "100%", "height": "100%", "symbol": symbol, "interval": "D", "timezone": "Etc/UTC", "theme": "dark", "style": "1", "locale": "it", "enable_publishing": false, "hide_side_toolbar": false, "allow_symbol_change": true, "container_id": "tradingview_chart"
            });
        }
        function switchSymbol(symbol) {
            document.getElementById('chart-title').textContent = 'MARKET ANALYTICS // ' + symbol.split(':')[1];
            initChart(symbol);
        }
        function startTransition() {
            document.body.classList.add('page-exit');
            setTimeout(() => { window.location.href = "editoriale.html"; }, 1000);
        }
        function updateClock() { document.getElementById('clock').textContent = new Date().toLocaleTimeString('it-IT', { hour12: false }); }
        setInterval(updateClock, 1000);
        updateClock();
        initChart();
    </script>
</body>
</html>
