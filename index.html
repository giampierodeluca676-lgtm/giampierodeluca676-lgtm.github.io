<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEYGAP | Professional Trading Terminal v4.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #06080a;
            --bg-card: #0d1117;
            --accent: #00ff88;
            --text-main: #f0f2f5;
            --text-dim: #848e9c;
            --border: #21262d;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: grid;
            grid-template-rows: 80px 1fr 35px;
            height: 100vh;
            overflow: hidden;
        }

        /* HEADER CON SPAZIO BANNER */
        header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: grid;
            grid-template-columns: 250px 1fr 250px;
            align-items: center;
            padding: 0 20px;
            gap: 20px;
        }

        .logo { font-weight: 900; font-size: 1.4rem; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        .ad-container-header {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 60px;
            background: rgba(255,255,255,0.02);
            border-radius: 4px;
            overflow: hidden;
        }

        .btn-archive {
            background: var(--accent);
            color: #000;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: 800;
            font-size: 0.75rem;
            text-align: center;
            text-transform: uppercase;
        }

        /* LAYOUT MAIN */
        main {
            display: grid;
            grid-template-columns: 300px 1fr 380px;
            gap: 5px;
            padding: 5px;
            background: #000;
        }

        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-title {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: var(--text-dim);
            padding: 10px 15px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border);
            font-family: 'JetBrains Mono';
        }

        footer {
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 0.7rem;
            color: var(--text-dim);
        }

        .status-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; margin-right: 10px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div class="logo">KEY<span>GAP</span> COMMAND</div>
    
    <div class="ad-container-header">
        <script src="https://pl28819682.effectivegatecpm.com/07/47/37/074737f2d1be0f3c0e9de0585a695fd7.js"></script>
    </div>

    <a href="archivio.html" class="btn-archive">📂 ARCHIVIO REPORT</a>
</header>

<main>
    <div class="panel">
        <div class="panel-title">TOP_MARKET_MOVERS</div>
        <iframe src="https://www.widgets.investing.com/top-crypto-movers?theme=darkTheme" width="100%" height="100%" frameborder="0" allowtransparency="true"></iframe>
    </div>

    <div class="panel">
        <div class="panel-title">LIVE_TERMINAL_CHART // BTCEUR 1m</div>
        <div style="flex-grow: 1;">
            <div id="tradingview_main" style="height: 100%; width: 100%;"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
            <script type="text/javascript">
                new TradingView.widget({
                    "autosize": true,
                    "symbol": "BINANCE:BTCEUR",
                    "interval": "1",
                    "timezone": "Europe/Rome",
                    "theme": "dark",
                    "style": "1",
                    "locale": "it",
                    "toolbar_bg": "#f1f3f6",
                    "enable_publishing": false,
                    "allow_symbol_change": true,
                    "container_id": "tradingview_main"
                });
            </script>
        </div>
    </div>

    <div style="display: grid; grid-template-rows: 1fr 1fr; gap: 5px;">
        <div class="panel">
            <div class="panel-title">INTELLIGENCE_FEED</div>
            <iframe src="https://cryptopanic.com/widgets/news/?bg_color=0d1117&font_family=sans-serif&header_bg_color=0d1117&header_text_color=FFFFFF&link_color=00ff88&news_feed=recent&text_color=f0f2f5&title=Latest" width="100%" height="100%" frameborder="0"></iframe>
        </div>
        <div class="panel">
            <div class="panel-title">ECONOMIC_CALENDAR</div>
            <iframe src="https://sslecal2.investing.com?columns=exc_flags,exc_currency,exc_importance,exc_actual,exc_forecast,exc_previous&category=_main&importance=2,3&features=datepicker,timezone&countries=25,32,6,37,7,5&calType=day&timeZone=58&lang=5" width="100%" height="100%" frameborder="0" style="filter: invert(1) hue-rotate(180deg) brightness(0.8);"></iframe>
        </div>
    </div>
</main>

<footer>
    <div class="status-dot"></div>
    KEYGAP_TERMINAL_v4.5 // MONETIZATION_ACTIVE // SOURCE: REAL_TIME_STREAM
</footer>

</body>
</html>
