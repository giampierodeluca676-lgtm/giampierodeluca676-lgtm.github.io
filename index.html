<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keygap Advantage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .ticker-wrap { background: #000; color: #3b82f6; padding: 10px 0; overflow: hidden; border-bottom: 1px solid #1e40af; }
        .ticker-move { display: inline-block; white-space: nowrap; animation: scroll 30s linear infinite; font-family: monospace; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="bg-black text-white font-sans">

    <div class="ticker-wrap">
        <div class="ticker-move" id="ticker-text">CONNESSO AD ADSTERRA • STATUS: LIVE • MARKET DATA ACTIVE • KEYGAP ADVANTAGE • </div>
    </div>

    <div class="p-6 flex justify-between items-center max-w-6xl mx-auto">
        <h1 class="text-3xl font-black tracking-tighter text-blue-600 italic">KEYGAP <span class="text-white">ADV</span></h1>
        <div class="text-right">
            <p id="live-clock" class="text-3xl font-mono font-bold text-white">00:00:00</p>
            <p class="text-[10px] text-blue-500 uppercase tracking-widest font-bold">Live System Time</p>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-4 grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <div class="glass p-4 rounded-xl text-center">
            <p class="text-[10px] uppercase text-gray-500">Prezzo BTC</p>
            <p id="price" class="text-xl font-bold text-white">--.---</p>
        </div>
        <div class="glass p-4 rounded-xl text-center">
            <p class="text-[10px] uppercase text-gray-500">Segnale</p>
            <p id="signal" class="text-xl font-bold text-green-400">---</p>
        </div>
        <div class="glass p-4 rounded-xl text-center">
            <p class="text-[10px] uppercase text-gray-500">Affidabilità</p>
            <p id="reliability" class="text-xl font-bold text-blue-400">--%</p>
        </div>
        <div class="glass p-4 rounded-xl text-center">
            <p class="text-[10px] uppercase text-gray-500">Ultimo Sync</p>
            <p id="bot-update" class="text-xl font-mono text-gray-400">--:--</p>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-4 pb-10">
        <div class="glass rounded-3xl overflow-hidden shadow-2xl" style="height: 500px;">
            <div id="tv-widget" style="height: 100%;"></div>
        </div>
    </div>

    <script src="https://pl28819682.effectivegatecpm.com/07/47/37/074737f2d1be0f3c0e9de0585a695fd7.js"></script>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('it-IT'); }, 1000);

        new TradingView.widget({
            "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "D",
            "theme": "dark", "style": "1", "locale": "it",
            "allow_symbol_change": true, "container_id": "tv-widget"
        });

        async function checkUpdates() {
            try {
                const r = await fetch('market_status.json?v=' + Date.now());
                const d = await r.json();
                document.getElementById('price').innerText = d.price || '---';
                document.getElementById('signal').innerText = d.signal || '---';
                document.getElementById('reliability').innerText = d.reliability || '--%';
                document.getElementById('bot-update').innerText = d.last_update || '--:--';
                if(d.ticker) document.getElementById('ticker-text').innerText = d.ticker.repeat(3);
            } catch (e) {}
        }
        setInterval(checkUpdates, 10000);
        checkUpdates();
    </script>
</body>
</html>
