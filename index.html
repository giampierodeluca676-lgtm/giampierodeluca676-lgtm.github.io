<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEYGAP | TITAN TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #010204; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .neon-text { color: var(--neon); text-shadow: 0 0 15px rgba(0, 242, 255, 0.7); font-family: 'Orbitron', sans-serif; }
        
        /* HEADER FISSO */
        header { height: 80px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid rgba(0, 242, 255, 0.2); }
        .logo-keygap { font-size: 2.5rem; font-weight: 900; letter-spacing: -2px; italic: true; }

        /* LAYOUT PRINCIPALE */
        .main-container { flex: 1; display: flex; flex-direction: column; padding: 20px; gap: 20px; overflow: hidden; }
        
        /* GRAFICO PROPORZIONATO */
        .chart-box { flex: 2; min-height: 300px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; background: #000; }

        /* CARD IN RILIEVO E TASTI LUMINOSI */
        .side-card { flex: 1; background: rgba(10, 15, 25, 0.95); border: 2px solid var(--neon); border-radius: 12px; padding: 20px; box-shadow: 0 0 30px rgba(0, 242, 255, 0.15); display: flex; flex-direction: column; justify-content: space-between; }
        
        .btn-glow { 
            background: rgba(0, 242, 255, 0.05); 
            border: 1px solid var(--neon); 
            color: var(--neon);
            font-family: 'Orbitron';
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-shadow: 0 0 5px var(--neon);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }
        .btn-glow:hover { 
            background: var(--neon); 
            color: #000; 
            box-shadow: 0 0 25px var(--neon);
            transform: scale(1.02);
        }

        .status-row { border-bottom: 1px solid rgba(0, 242, 255, 0.1); padding: 8px 0; display: flex; justify-content: space-between; font-family: 'Orbitron'; font-size: 0.8rem; }

        @media (min-width: 1024px) {
            .main-container { flex-direction: row; }
            .chart-box { flex: 3; }
            .side-card { flex: 1; max-width: 400px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-keygap neon-text">KEYGAP<span class="text-white">_</span></div>
        <div class="text-right">
            <div id="date" class="text-xs opacity-50">--/--/----</div>
            <div id="clock" class="neon-text text-3xl font-bold">00:00:00</div>
        </div>
    </header>

    <div class="main-container">
        <div class="chart-box">
            <div id="tradingview_chart" style="width: 100vw; height: 100%;"></div>
        </div>

        <div class="side-card">
            <div>
                <div class="neon-text text-[10px] mb-4 tracking-[4px]">MARKET_STATUS_REPORT</div>
                <div class="status-row"><span class="opacity-50">STATUS</span><span id="m-status" class="text-green-400">OPERATIVO</span></div>
                <div class="status-row"><span class="opacity-50">PRICE</span><span id="m-price">---</span></div>
                <div class="status-row"><span class="opacity-50">SIGNAL</span><span id="m-signal">---</span></div>
                <div class="status-row"><span class="opacity-50">ACCURACY</span><span id="m-reliability">---</span></div>
            </div>

            <div class="flex flex-col gap-3 mt-6">
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="switchSymbol('BITSTAMP:BTCUSD')" class="btn-glow p-3 text-[10px]">BITCOIN</button>
                    <button onclick="switchSymbol('TVC:GOLD')" class="btn-glow p-3 text-[10px]">GOLD</button>
                </div>
                <button onclick="window.location.href='editoriale.html'" class="btn-glow p-4 font-bold tracking-[2px] bg-cyan-950/30">NEWS TERMINAL</button>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        async function loadData() {
            try {
                const r = await fetch('./market_status.json?v=' + Date.now());
                const d = await r.json();
                document.getElementById('m-status').textContent = d.status;
                document.getElementById('m-price').textContent = d.price;
                document.getElementById('m-signal').textContent = d.signal;
                document.getElementById('m-reliability').textContent = d.reliability;
            } catch (e) { console.log("Waiting for data..."); }
        }

        function initChart(symbol = 'BITSTAMP:BTCUSD') {
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": "D",
                "theme": "dark",
                "style": "1",
                "locale": "it",
                "container_id": "tradingview_chart",
                "hide_side_toolbar": true
            });
        }

        function switchSymbol(s) { initChart(s); }
        function updateTime() {
            const n = new Date();
            document.getElementById('clock').textContent = n.toLocaleTimeString('it-IT');
            document.getElementById('date').textContent = n.toLocaleDateString('it-IT');
        }

        setInterval(updateTime, 1000);
        setInterval(loadData, 5000);
        updateTime();
        initChart();
        loadData();
    </script>
</body>
</html>
