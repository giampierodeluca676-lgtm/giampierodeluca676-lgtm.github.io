<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KEYGAP | TITAN TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #010204; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; perspective: 1500px; min-height: 100vh; overflow-x: hidden; }
        .neon-text { color: var(--neon); text-shadow: 0 0 15px rgba(0, 242, 255, 0.7); font-family: 'Orbitron', sans-serif; }
        
        /* Modifica Terminal Grid per Mobile */
        .terminal-grid { 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            padding: 15px; 
            gap: 20px; 
        }

        /* Titolo ridimensionabile */
        .main-title { 
            font-size: clamp(1.8rem, 8vw, 3.5rem); 
            font-weight: 900; 
            text-transform: uppercase; 
            font-style: italic; 
            letter-spacing: 2px; 
            text-align: center; 
            line-height: 1.1; 
        }
        .main-title span { color: var(--neon); text-shadow: 0 0 30px rgba(0, 242, 255, 0.6); }

        /* Pulsanti adattivi */
        .btn-asset { 
            background: rgba(0, 242, 255, 0.05); 
            border: 1px solid rgba(0, 242, 255, 0.4); 
            padding: 12px 20px; 
            font-family: 'Orbitron'; 
            font-size: clamp(10px, 3vw, 14px); 
            font-weight: 700; 
            letter-spacing: 2px; 
            transition: 0.4s;
            flex: 1 1 40%; /* Due pulsanti per riga su mobile */
        }
        
        .btn-terminal { 
            border: 3px solid var(--neon); 
            padding: 15px 30px; 
            font-family: 'Orbitron'; 
            font-size: clamp(12px, 4vw, 16px); 
            font-weight: 900; 
            letter-spacing: 5px; 
            background: rgba(0, 242, 255, 0.1); 
            transition: 0.5s; 
            width: 100%;
            max-width: 400px;
        }

        /* Altezza Grafico dinamica */
        .chart-frame { 
            background: #000; 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 4px; 
            position: relative; 
            height: 400px; /* Altezza minima su mobile */
            flex-grow: 1;
        }

        @media (min-width: 1024px) {
            .terminal-grid { display: grid; grid-template-rows: auto auto 1fr auto; height: 100vh; padding: 25px 50px; }
            .chart-frame { height: auto; }
            .btn-terminal { width: auto; letter-spacing: 10px; }
        }

        .page-exit { opacity: 0; filter: blur(50px); transform: scale(1.3); transition: 1.2s; }
    </style>
</head>
<body>
    <div class="terminal-grid">
        <header class="flex justify-between items-center opacity-70">
            <div class="text-left">
                <div class="neon-text text-[8px] sm:text-[10px] tracking-[4px] sm:tracking-[6px] mb-1">SYSTEM://DATE</div>
                <div id="date" class="text-lg sm:text-2xl font-light tracking-tighter text-white/50 uppercase">--/--/----</div>
            </div>
            <div class="text-right">
                <div class="neon-text text-[8px] sm:text-[10px] tracking-[4px] sm:tracking-[6px] mb-1">SYSTEM://TIME</div>
                <div id="clock" class="text-lg sm:text-2xl font-light tracking-tighter text-white/50">00:00:00</div>
            </div>
        </header>

        <div class="flex flex-col items-center gap-6">
            <h1 class="main-title"><span>Keygap</span> Advantage [cite: 1]</h1>
            <div class="flex flex-col items-center gap-4 w-full">
                <div class="flex flex-wrap justify-center gap-3 w-full">
                    <button onclick="switchSymbol('BITSTAMP:BTCUSD')" class="btn-asset uppercase">Bitcoin [cite: 2]</button>
                    <button onclick="switchSymbol('TVC:GOLD')" class="btn-asset uppercase">Gold</button>
                    <button onclick="switchSymbol('SP:SPX')" class="btn-asset uppercase">S&P 500</button>
                    <button onclick="switchSymbol('FX:EURUSD')" class="btn-asset uppercase">EUR / USD</button>
                </div>
                <button onclick="startTransition()" class="btn-terminal uppercase">> Terminale Notizie</button>
            </div>
        </div>

        <div class="chart-frame">
            <div class="panel-header flex justify-between items-center p-3 border-b border-white/10 bg-[#0d1117]">
                <span id="chart-title" class="neon-text text-[9px] sm:text-[12px] tracking-[4px] sm:tracking-[8px]">PRIMARY DATASTREAM // BTCUSD [cite: 2]</span>
                <span class="hidden sm:inline text-[10px] text-white/40 tracking-[3px]">ENCRYPTED FEED</span>
            </div>
            <div id="tradingview_chart" style="height: calc(100% - 48px); width: 100%;"></div>
        </div>
        
        <footer class="text-center opacity-20 pb-2">
            <div class="neon-text text-[8px] tracking-[10px] sm:tracking-[40px]">Keygap Titan</div>
        </footer>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        function initChart(symbol = 'BITSTAMP:BTCUSD') {
            new TradingView.widget({ 
                "width": "100%", 
                "height": "100%", 
                "symbol": symbol, 
                "interval": "D", 
                "timezone": "Etc/UTC", 
                "theme": "dark", 
                "style": "1", 
                "locale": "it", 
                "container_id": "tradingview_chart",
                "hide_side_toolbar": true,
                "allow_symbol_change": false,
                "save_image": false
            });
        }
        function switchSymbol(symbol) { 
            document.getElementById('chart-title').textContent = 'PRIMARY DATASTREAM // ' + symbol.split(':')[1]; 
            initChart(symbol); 
        }
        function startTransition() { 
            document.body.classList.add('page-exit'); 
            setTimeout(() => { window.location.href = "editoriale.html"; }, 1000); 
        }
        function updateDateTime() { 
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT', { hour12: false });
            document.getElementById('date').textContent = now.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }
        setInterval(updateDateTime, 1000); 
        updateDateTime(); 
        initChart();
    </script>
</body>
</html>
