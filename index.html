<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keygap Advantage | Professional Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .ticker-wrap { background: #000; color: #3b82f6; padding: 10px 0; overflow: hidden; border-bottom: 1px solid #1e40af; z-index: 100; position: sticky; top: 0; }
        .ticker-move { display: inline-block; white-space: nowrap; animation: scroll 40s linear infinite; font-family: monospace; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(59, 130, 246, 0.2); }
        
        #news-drawer { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 500; }
        .drawer-closed { transform: translateX(100%); }
        .drawer-open { transform: translateX(0); }
        #intelligence-overlay { transition: opacity 0.5s ease-in-out; z-index: 600; }
    </style>
</head>
<body class="bg-[#020617] text-gray-200 font-sans overflow-x-hidden">

    <div class="ticker-wrap">
        <div class="ticker-move">CARICAMENTO FLUSSI DATI KEYGAP ADVANTAGE... BTC/USDT IN ATTESA... SENTIMENT DI MERCATO...</div>
    </div>

    <main class="p-4 lg:p-6 max-w-[1800px] mx-auto flex flex-col lg:flex-row gap-6 min-h-screen">
        
        <div class="w-full lg:w-80 flex flex-col gap-4">
            
            <div class="glass p-5 rounded-2xl border-b-2 border-blue-500 shadow-lg">
                <h3 class="text-[10px] font-bold text-gray-400 uppercase mb-4 tracking-widest">Market Data</h3>
                <div class="space-y-4">
                    <div class="bg-black/40 p-3 rounded-xl border border-white/5 text-center">
                        <span class="text-[10px] text-gray-500 block uppercase italic">Prezzo BTC</span>
                        <div id="price" class="text-2xl font-black text-white">---</div>
                    </div>
                    <div class="bg-black/40 p-3 rounded-xl border border-white/5 text-center">
                        <span class="text-[10px] text-gray-500 block uppercase italic">Segnale</span>
                        <div id="signal" class="text-2xl font-black text-blue-400">---</div>
                    </div>
                </div>
            </div>

            <div class="glass p-5 rounded-2xl border-l-4 border-red-600 shadow-xl bg-gradient-to-br from-red-950/10 to-transparent">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-[10px] font-bold text-red-500 animate-pulse uppercase">● TG LIVE Intelligence</span>
                </div>
                <div id="tg-headline" class="text-lg font-bold text-white italic min-h-[60px] leading-tight">Sincronizzazione flussi...</div>
                <div class="w-full bg-gray-800 h-1.5 rounded-full mt-4 overflow-hidden">
                    <div id="tg-progress" class="bg-red-600 h-full w-0 shadow-[0_0_10px_#dc2626]"></div>
                </div>
            </div>

            <div class="flex flex-col gap-3 flex-grow">
                <button onclick="toggleIntelligence()" class="w-full h-24 bg-red-600 hover:bg-red-700 text-white rounded-2xl font-black text-sm transition-all shadow-lg shadow-red-900/30 active:scale-95 border border-red-500/20 flex items-center justify-center gap-2">
                    📊 <span class="uppercase tracking-tighter">Intelligence Terminal</span>
                </button>
                <button onclick="toggleNews()" class="w-full h-24 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-black text-sm transition-all shadow-lg shadow-blue-900/30 active:scale-95 border border-blue-500/20 flex items-center justify-center gap-2">
                    📰 <span class="uppercase tracking-tighter">Notizie Live Feed</span>
                </button>
            </div>
        </div>

        <div class="flex-1 flex flex-col gap-4">
            <header class="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-gray-800 pb-4">
                <div>
                    <h1 class="text-4xl font-black italic text-white tracking-tighter uppercase">KEYGAP <span class="text-blue-500">ADVANTAGE</span></h1>
                    <p class="text-[10px] font-mono text-blue-400/60 uppercase tracking-[0.3em]">HFT Professional Node v4.0</p>
                </div>
                
                <div class="text-right mt-4 md:mt-0">
                    <div id="live-date" class="text-blue-500 font-bold text-sm uppercase tracking-widest mb-1">DATA</div>
                    <div id="live-clock" class="text-5xl font-black text-white font-mono tracking-tighter">00:00:00</div>
                </div>
            </header>

            <div class="flex-1 glass rounded-3xl overflow-hidden min-h-[600px] border border-white/5 relative shadow-inner">
                <div id="main-chart" class="w-full h-full"></div>
            </div>
        </div>
    </main>

    <div id="news-drawer" class="fixed top-0 right-0 h-full w-full md:w-[450px] glass border-l border-gray-800 drawer-closed flex flex-col shadow-2xl">
        <div class="p-6 border-b border-gray-800 flex justify-between items-center bg-black/60">
            <h2 class="font-black text-2xl italic text-white uppercase">Live Feed</h2>
            <button onclick="toggleNews()" class="text-white text-4xl">&times;</button>
        </div>
        <div id="news-container" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
    </div>

    <div id="intelligence-overlay" class="fixed inset-0 bg-black/95 hidden opacity-0 flex flex-col p-4 md:p-8">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-black italic text-red-600 tracking-tighter uppercase">Intelligence Report</h2>
            <button onclick="toggleIntelligence()" class="text-white text-6xl font-light hover:text-red-500">&times;</button>
        </div>
        <div id="reports-display-area" class="flex-1 overflow-y-auto rounded-2xl bg-white/5 p-6 border border-white/10"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        function toggleNews() { const d = document.getElementById('news-drawer'); d.classList.toggle('drawer-closed'); d.classList.toggle('drawer-open'); }
        async function toggleIntelligence() {
            const o = document.getElementById('intelligence-overlay');
            if (o.classList.contains('hidden')) {
                o.classList.remove('hidden'); setTimeout(() => o.classList.add('opacity-100'), 10); await loadIntelligenceReports();
            } else { o.classList.remove('opacity-100'); setTimeout(() => o.classList.add('hidden'), 500); }
        }

        async function loadIntelligenceReports() {
            const area = document.getElementById('reports-display-area');
            area.innerHTML = '<div class="text-center text-red-500 font-mono animate-pulse text-2xl mt-20 uppercase">Decoding secure data stream...</div>';
            try {
                const response = await fetch('latest_report.html?v=' + Date.now());
                area.innerHTML = response.ok ? await response.text() : '<p class="text-center text-gray-500">In attesa del prossimo report...</p>';
            } catch (e) { area.innerHTML = 'Connessione Fallita.'; }
        }

        function updateDateTime() {
            const ora = new Date();
            const opzioniData = { day: '2-digit', month: 'long', year: 'numeric' };
            document.getElementById('live-date').innerText = ora.toLocaleDateString('it-IT', opzioniData).toUpperCase();
            document.getElementById('live-clock').innerText = ora.toLocaleTimeString('it-IT');
        }
        setInterval(updateDateTime, 1000); updateDateTime();

        new TradingView.widget({ "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "15", "theme": "dark", "container_id": "main-chart", "locale": "it" });

        let newsIndex = 0;
        async function sync() {
            try {
                const r = await fetch('market_status.json?v=' + Date.now());
                const d = await r.json();
                document.getElementById('price').innerText = d.price || '---';
                document.getElementById('signal').innerText = d.signal || '---';
                if (d.news && d.news.length > 0) {
                    const nc = document.getElementById('news-container');
                    nc.innerHTML = d.news.map(n => `<div class="p-4 border-b border-white/5"><b class="text-blue-500 text-xs">${n.time}</b><p class="text-sm">${n.text}</p></div>`).join('');
                    document.getElementById('tg-headline').innerText = d.news[newsIndex].text;
                    const prog = document.getElementById('tg-progress');
                    prog.style.transition = 'none'; prog.style.width = '0%';
                    setTimeout(() => { prog.style.transition = 'width 11800ms linear'; prog.style.width = '100%'; }, 100);
                    newsIndex = (newsIndex + 1) % d.news.length;
                }
            } catch(e) {}
        }
        setInterval(sync, 12000); sync();
    </script>
</body>
</html>
